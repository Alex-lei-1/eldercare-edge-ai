<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>ARGUS: on-device elder-care on RK3588 (fall detection and a voice assistant)</title>
<meta name="description" content="ARGUS is an on-device elder-care system on the RK3588: real-time fall detection from camera pose plus a local voice assistant. All inference runs on the device; no video or audio is sent to the cloud. Each module opens into sub-modules with flow charts, data flow and annotated implementation sketches.">
<style>
  :root{
    --bg:#faf6ef; --bg2:#f3ece1; --card:#ffffff; --card2:#f6f1e8; --line:#e9e0d3;
    --tx:#33302b; --tx2:#6f655b; --tx3:#9c9085;
    --hw:#8a8076; --vis:#4f86a8; --fall:#d98a45; --alert:#cf6a52; --voice:#3f8f6b; --ops:#9b7bb0;
    --accent:#3f8f6b; --warm:#e08a4a; --r:16px;
    --sh:0 1px 2px rgba(60,45,25,.05), 0 4px 16px rgba(70,50,25,.07);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;min-height:100vh;background:radial-gradient(1100px 520px at 78% -10%,#ffffff 0%,var(--bg) 60%);
    color:var(--tx);font:15.5px/1.62 "Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:980px;margin:0 auto;padding:0 22px}

  /* nav */
  nav{position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);background:rgba(250,246,239,.85);border-bottom:1px solid var(--line)}
  nav .wrap{display:flex;align-items:center;gap:14px;height:58px}
  nav .brand{font-weight:800;letter-spacing:.4px;cursor:pointer;color:var(--tx)}
  nav .brand small{color:var(--tx3);font-weight:500;margin-left:8px;letter-spacing:0}
  .langsw{margin-left:auto;display:flex;gap:4px;font-size:13px}
  .langsw button{padding:5px 12px;border-radius:999px;border:1px solid var(--line);color:var(--tx2);background:#fff;cursor:pointer;font:inherit;font-size:13px}
  .langsw button.on{background:var(--accent);color:#fff;border-color:transparent;font-weight:700}
  .navlinks{display:flex;gap:1px;overflow-x:auto;flex:1;min-width:0;scrollbar-width:none}
  .navlinks::-webkit-scrollbar{display:none}
  .navlink{white-space:nowrap;font-size:12.5px;color:var(--tx2);padding:5px 8px;border-radius:7px;cursor:pointer}
  .navlink:hover{background:var(--card2);color:var(--tx)}
  /* background / motivation */
  .bgstats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0 6px}
  .bgstat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
  .bgstat .ic{width:28px;height:28px;margin-bottom:8px;display:block}
  .bgstat .v{font-size:25px;font-weight:800;color:var(--tx);letter-spacing:.3px;line-height:1.1}
  .bgstat .l{font-size:12px;color:var(--tx2);line-height:1.45;margin-top:6px}
  .popbar{margin:14px 0 4px}
  .bgnote{color:var(--tx2);font-size:14px;line-height:1.7;margin:16px 0 6px}
  .bgsrc{color:var(--tx3);font-size:11.5px;line-height:1.55;margin:0}
  @media(max-width:760px){.bgstats{grid-template-columns:repeat(2,1fr)}}
  .grhl{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0 4px}
  .grhlitem{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:13px 14px}
  .grhlitem .grv{font-size:19px;font-weight:800;color:var(--accent);line-height:1.15}
  .grhlitem .grl{font-size:11.5px;color:var(--tx2);line-height:1.45;margin-top:5px}
  @media(max-width:760px){.grhl{grid-template-columns:1fr}}
  /* latency budget */
  .lbwrap{margin-top:6px}
  .lbtbl{margin-top:14px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .lbrow{display:grid;grid-template-columns:1.3fr .6fr .9fr 2fr;gap:10px;align-items:center;padding:10px 13px;border-top:1px solid var(--line);font-size:12.5px}
  .lbrow:first-child{border-top:none}
  .lbrow .lbst{font-weight:600;color:var(--tx)}
  .lbrow .lbtime{font-weight:800;font-family:ui-monospace,Menlo,monospace;font-size:12px}
  .lbrow .lbtype{color:var(--tx2);font-size:11.5px}
  .lbrow .lbnote{color:var(--tx2);font-size:11.5px;line-height:1.4}
  .lbrow.lbtot{background:var(--card2)}
  .lbrow.lbtot .lbst{font-weight:800}
  @media(max-width:760px){.lbrow{grid-template-columns:1fr auto;gap:3px 10px}.lbrow .lbnote{grid-column:1/3}}
  /* observability */
  .obsrow{display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center;padding:9px 13px;border-top:1px solid var(--line);font-size:12.5px}
  .obsrow:first-child{border-top:none}
  .obsep{font-family:ui-monospace,Menlo,monospace;color:var(--accent);font-size:12px}
  .obsd{color:var(--tx2)}
  .obsm{margin:8px 0 4px;padding-left:18px;color:var(--tx2);font-size:13px;line-height:1.8}
  .mxwrap{margin:8px 0 4px}
  .mxrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .mxbox{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:7px 11px;display:flex;flex-direction:column;min-width:0}
  .mxbox b{font-size:12.5px;color:var(--tx);font-weight:600}
  .mxbox span{font-size:10.5px;color:var(--tx3);margin-top:1px}
  .mxbox.mxhub{border-color:var(--accent)}
  .mxbox.mxout b{color:var(--accent)}
  .mxar{color:var(--tx3);font-size:14px}
  .mxnote{font-size:11.5px;color:var(--tx3)}
  .obsrss{display:grid;grid-template-columns:1fr 90px 70px;gap:10px;padding:9px 13px;border-top:1px solid var(--line);font-size:12.5px}
  .obsrss:first-child{border-top:none}
  .obsrss.obswin{background:var(--card2)}
  .obsrss .obsrl{color:var(--tx);font-weight:600}
  .obsrss .obsrv{font-family:ui-monospace,Menlo,monospace;color:var(--accent);font-weight:700}
  .obsrss .obsrc{font-family:ui-monospace,Menlo,monospace;color:var(--tx2)}
  .implgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:6px 0 4px}
  .implitem{display:flex;gap:8px;align-items:flex-start;background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:12.5px;color:var(--tx2);line-height:1.45}
  .implck{color:var(--accent);font-weight:800;flex:none}
  @media(max-width:760px){.implgrid{grid-template-columns:1fr}}
  .coremap{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin:6px 0}
  .corecell{border:1px solid var(--line);border-radius:8px;padding:8px 5px;text-align:center;background:var(--card2)}
  .corecell.a76{background:#eef5f1}
  .corecell b{display:block;font-family:ui-monospace,monospace;font-size:12px;color:var(--tx)}
  .corecell span{display:block;font-size:9px;color:var(--tx2);margin-top:3px;line-height:1.25}
  .coreleg{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--tx3);margin-top:7px}
  .coreleg .a55{color:var(--tx2)} .coreleg .a76{color:var(--accent)}
  @media(max-width:760px){.coremap{grid-template-columns:repeat(4,1fr)}}
  .otaflow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin:6px 0}
  .otastep{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--tx)}
  .otaar{color:var(--tx3)}
  .otaends{display:flex;gap:16px;flex-wrap:wrap;margin-top:9px;font-size:12px}
  .otaok{color:var(--accent);font-weight:600} .otabad{color:var(--warm);font-weight:600}
  .otanote{font-size:11.5px;color:var(--tx3);margin-top:7px}
  .evgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:6px}
  .evcard{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .evttl{background:var(--card2);border-bottom:1px solid var(--line);padding:7px 12px;font-size:12px;font-weight:600;color:var(--tx2);font-family:ui-monospace,monospace}
  .evpre{margin:0;padding:10px 12px;font-family:ui-monospace,Menlo,monospace;font-size:11px;line-height:1.5;color:var(--tx2);white-space:pre-wrap;word-break:break-all}
  @media(max-width:760px){.evgrid{grid-template-columns:1fr}}
  .netfigs{display:grid;grid-template-columns:1fr;gap:16px;margin-top:6px}
  .netfig{margin:0}
  .netfig img{width:100%;border:1px solid var(--line);border-radius:10px;display:block}
  .netfig figcaption{font-size:12px;color:var(--tx2);margin-top:7px;line-height:1.5}

  /* breadcrumb */
  .crumb{font-size:13px;color:var(--tx3);padding:18px 0 0}
  .crumb a{color:var(--tx2)} .crumb span{color:var(--tx3);margin:0 7px}

  /* hero */
  header.hero{padding:54px 0 30px}
  .eyebrow{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase}
  h1{font-size:clamp(28px,5vw,44px);line-height:1.12;margin:14px 0 12px;letter-spacing:-.3px;color:var(--tx)}
  h1 .grad{color:var(--accent)}
  .lede{font-size:clamp(15px,2.3vw,19px);color:var(--tx2);max-width:740px}
  .wordmark{font-size:clamp(44px,8.5vw,82px);font-weight:800;letter-spacing:2px;line-height:1;margin:10px 0 6px;color:#3a2e26}
  .tagline{font-size:clamp(18px,3vw,27px);font-weight:700;color:var(--tx);letter-spacing:-.2px;margin:0 0 14px}
  .herowrap{display:grid;grid-template-columns:1.05fr .95fr;gap:30px;align-items:center}
  @media(max-width:760px){.herowrap{grid-template-columns:1fr;gap:16px}}
  .heroart svg{width:100%;height:auto;display:block}
  .brand .logo{vertical-align:-7px;margin-right:7px}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:760px){.metrics{grid-template-columns:repeat(2,1fr)}}
  .mgroup{margin:0 0 22px}
  .mgroup:last-child{margin-bottom:0}
  .mgtitle{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:700;color:var(--tx);margin:0 0 12px}
  .mgtitle .gd{width:11px;height:11px;border-radius:4px;background:var(--gc,var(--accent))}
  .mgrow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:680px){.mgrow{grid-template-columns:repeat(2,1fr)}}
  .mitem{background:var(--card2);border-radius:12px;padding:15px 16px}
  .mitem b{display:block;font-size:23px;letter-spacing:-.3px;line-height:1.1;color:var(--tx)}
  .mitem span{display:block;color:var(--tx2);font-size:12.5px;margin-top:7px;line-height:1.45}
  .benchwrap{margin-top:22px}
  .bttl{font-size:14px;font-weight:700;color:var(--tx);margin:0 0 8px}
  .benchwrap svg{width:100%;height:auto;display:block}
  .skelfig{margin:18px 0 0;background:var(--card2);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .skelfig img{display:block;width:100%;height:auto}
  .skelfig figcaption{padding:11px 14px;font-size:13px;color:var(--tx2);border-top:1px solid var(--line)}
  .abnote{margin-top:8px;font-size:13px;line-height:1.55;color:var(--tx2)}
  .techstack{margin-top:0;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;line-height:1.55;color:var(--tx2);background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .rmap{margin-top:10px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card)}
  .rmaprow{display:flex;flex-wrap:wrap;gap:8px;align-items:baseline;padding:9px 14px;border-top:1px solid var(--line);font-size:13px}
  .rmaprow:first-child{border-top:none}
  .rmap .ru{color:var(--accent);font-weight:500;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .rmap .rarr{color:#b3a895}
  .rmap .rb{color:var(--tx2);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .rmap .rtag{margin-left:auto;font-size:12px;color:var(--warm);background:rgba(224,138,74,.12);padding:1px 9px;border-radius:8px}
  .engsub{font-size:14px;color:var(--tx2);line-height:1.6;margin:0 0 6px;max-width:820px}
  .engh{font-size:16px;font-weight:500;color:var(--tx);margin:22px 0 10px}
  .buggrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
  .bugcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .bugcard h4{margin:0 0 8px;font-size:14px;font-weight:500;color:var(--tx)}
  .bcl{font-size:12.5px;line-height:1.5;color:var(--tx2);margin-top:5px}
  .bcl span{display:inline-block;min-width:50px;color:var(--accent);font-weight:500;text-transform:lowercase}
  .bce{margin-top:7px;border-top:1px dashed var(--line);padding-top:7px}
  .bce code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--tx)}
  .rmarea{margin-top:18px}
  .rmatitle{font-size:15px;font-weight:500;color:var(--tx);border-left:3px solid var(--gc);padding-left:10px;margin-bottom:10px}
  .rmgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(258px,1fr));gap:12px}
  .rmcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .rmhead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
  .rmhead h4{margin:0;font-size:14px;font-weight:500;color:var(--tx)}
  .rmwhen{font-size:11px;font-weight:500;color:#fff;background:var(--wc);padding:2px 8px;border-radius:8px;white-space:nowrap}
  .rmrow{font-size:12.5px;line-height:1.5;color:var(--tx2);margin-top:4px}
  .rmrow span{display:inline-block;min-width:46px;color:var(--accent);font-weight:500;text-transform:lowercase}
  .petbl,.smap,.vtbl{margin-top:6px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card);font-size:12.5px}
  .petrow{display:grid;grid-template-columns:minmax(0,1.6fr) 0.9fr minmax(0,2fr);gap:10px;align-items:baseline;padding:9px 14px;border-top:1px solid var(--line)}
  .petbl .petrow:first-child{border-top:none}
  .pepath{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--accent)}
  .pest{font-weight:500;color:var(--warm)}
  .pewhy{color:var(--tx2)}
  .vthead,.vtrow{display:grid;grid-template-columns:0.9fr 1.1fr 1.1fr 1.4fr 1.1fr;gap:10px;padding:9px 14px;border-top:1px solid var(--line)}
  .vthead{border-top:none;font-weight:500;color:var(--tx);background:var(--card2)}
  .vtrow{color:var(--tx2)}
  .vok{color:var(--accent);font-weight:500}
  .vtrow code,.smf{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px}
  .smrow{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.4fr);gap:10px;align-items:baseline;padding:9px 14px;border-top:1px solid var(--line)}
  .smap .smrow:first-child{border-top:none}
  .smq{color:var(--tx2)}
  .smf{color:var(--accent)}
  .rtblwrap{margin-top:14px}
  .rtblttl{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:6px}
  .rtbl{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card);font-size:12.5px}
  .rthead,.rtrow{display:grid;grid-template-columns:0.7fr 0.55fr 0.85fr 1.15fr 1.45fr 1.1fr;gap:8px;padding:8px 12px;border-top:1px solid var(--line)}
  .rthead{border-top:none;font-weight:500;color:var(--tx);background:var(--card2)}
  .rtrow{color:var(--tx2)}
  .rtrow code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--accent)}
  .archsub{font-size:14px;font-weight:500;color:var(--tx);margin:18px 0 8px}
  .archlayers{display:flex;flex-direction:column;gap:8px}
  .archrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--ac);border-radius:10px;padding:8px 12px}
  .archlbl{font-size:12px;font-weight:500;color:var(--tx);min-width:62px}
  .archnodes{display:flex;flex-wrap:wrap;gap:6px}
  .archnode{font-size:11.5px;color:var(--tx2);background:var(--card2);border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .ipctbl{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card);font-size:12.5px}
  .ipcrow{display:grid;grid-template-columns:0.8fr auto 1fr 1.9fr;gap:8px;align-items:baseline;padding:8px 12px;border-top:1px solid var(--line)}
  .ipctbl .ipcrow:first-child{border-top:none}
  .ipcfrom{color:var(--accent);font-weight:500}
  .ipcarr{color:#b3a895}
  .ipcto{color:var(--tx)}
  .ipcch{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--tx2)}
  .fstbl,.hptbl{margin-top:6px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card);font-size:12.5px}
  .fshead,.fsrow{display:grid;grid-template-columns:1.4fr 0.8fr 0.7fr 1.9fr;gap:8px;padding:8px 12px;border-top:1px solid var(--line)}
  .hphead,.hprow{display:grid;grid-template-columns:1fr 1.2fr 1.2fr;gap:8px;padding:8px 12px;border-top:1px solid var(--line)}
  .fshead,.hphead{border-top:none;font-weight:500;color:var(--tx);background:var(--card2)}
  .fsrow,.hprow{color:var(--tx2)}
  .fsrow code,.hprow code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--accent)}
  .seqflow{display:flex;flex-direction:column;align-items:flex-start;margin-top:6px}
  .seqstep{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:7px 14px;font-size:13px;color:var(--tx)}
  .seqarr{color:#b3a895;font-size:14px;margin:2px 0 2px 16px}
  .statusjson{margin-top:8px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;line-height:1.55;color:var(--tx2);overflow-x:auto;white-space:pre}
  .pvgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:6px}
  .pvbox{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--gc);border-radius:12px;padding:12px 14px}
  .pvk{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:8px}
  .pvitem{font-size:12.5px;color:var(--tx2);margin:3px 0;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .qawrap{display:grid;gap:10px}
  .qa{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:11px 14px}
  .qq{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:4px}
  .qaa{font-size:13px;line-height:1.55;color:var(--tx2)}
  .pvpwrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
  .pvpcol{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--gc);border-radius:12px;padding:12px 14px}
  .pvph{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:8px}
  .pvpcol code{display:block;font-size:12px;color:var(--tx2);margin:3px 0;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:34px 0 4px}
  @media(max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
  .stat b{display:block;font-size:24px;letter-spacing:-.3px;color:var(--accent)}
  .stat span{color:var(--tx2);font-size:12.5px}

  section{padding:34px 0}
  .secttl{display:flex;align-items:baseline;gap:12px;margin:8px 0 4px}
  h2{font-size:23px;margin:0;letter-spacing:-.2px;color:var(--tx)}
  .sub{color:var(--tx2);margin:4px 0 20px}

<script type="text/plain" data-src id="src-boot" data-lang="sh" data-file="systemd/eldercare-vision.service + run_pose_camera.sh + main()">
# systemd unit: allow all 8 cores, zero-copy preprocess, MediaMTX output
[Service]
CPUAffinity=0 1 2 3 4 5 6 7
Environment=VISION_PREPROCESS_BACKEND=zero-copy VISION_NO_NIGHT_ENHANCE=1
Environment=VISION_CAPTURE_CPUS=0-3 VISION_INFER_CPUS=6-7
Environment=RTSP_OUTPUT_ENABLE=1 RTSP_OUTPUT_MODE=mediamtx RTSP_OUTPUT_DMABUF=1
ExecStart=.../run_pose_camera.sh

# run_pose_camera.sh: ONE process owns the camera and the whole AI path.
# No outer taskset; the binary pins its own capture (0-3) and infer (6-7) threads.
main_yolo_pose_rknn_camera \
    --model yolov8n-pose.rknn --camera-device /dev/video12 \
    --width 640 --height 480 --fps 15 --fourcc NV12 \
    --preprocess-backend zero-copy --rknn-parallel-contexts 3 \
    --parallel-hold-v4l2-dmabuf --npu-core 0 \
    --infer-cpus 6-7 --capture-cpus 0-3 \
    --rtsp-output-enable --rtsp-output-dmabuf \
    --save-frames --save-dir /dev/shm/eldercare_frames

# main(): runs once at startup
cfg      = parse_camera_app_config(argc, argv)
pose_udp = PoseUdpSender(127.0.0.1:5800)      # to fall_service
rtsp_out = RtspOutputServer(:8554/eldercare)  # publishes to MediaMTX -> RTSP/WebRTC
rknn_init(ctx x3, yolov8n-pose.rknn)          # 3 parallel contexts
rknn_set_core_mask(ctx, NPU core 0)
</script>

<script type="text/plain" data-src id="src-v4l2open" data-lang="cpp" data-file="src/cpp_edge/camera_v4l2.cpp">
// V4L2MMapCamera::open(): configure_format -> init_mmap -> start_stream
set_format(VIDIOC_S_FMT, 640x480)
if (pixel_format != V4L2_PIX_FMT_NV12) return false;   // driver MUST output NV12

request_buffers(VIDIOC_REQBUFS, count = 8, MMAP)        // deep enough for 3 in-flight frames
for (i = 0; i < 8; ++i) {
    query(VIDIOC_QUERYBUF, i)                           // offset / length / planes
    mmap(buffer[i])                                     // CPU-visible view
    fd[i] = export(VIDIOC_EXPBUF, i)                    // DMA-BUF fd, RGA reads it directly
    queue(VIDIOC_QBUF, i)                               // give the empty buffer to the driver
}
stream_on(VIDIOC_STREAMON)                              // camera/ISP starts filling buffers
</script>

<script type="text/plain" data-src id="src-lifecycle" data-lang="cpp" data-file="src/cpp_edge/camera_v4l2.cpp + main loop">
// One capture-loop iteration. A buffer is only safe to touch between DQBUF and QBUF.
poll(camera_fd, 1000)                       // wait until a frame is ready
k = dequeue(VIDIOC_DQBUF)                    // driver: "buffer k is filled, it is yours"

frame  = Mat_view(mmap[k])                   // a VIEW over the mmap buffer, not a copy
dmabuf = fd[k]                               // the same buffer, as a DMA-BUF fd

// RGA -> RKNN -> tracking -> pose UDP -> RTSP push all read this buffer here

queue(VIDIOC_QBUF, k)                        // return it; the camera may overwrite it now
// keeping frame/dmabuf past QBUF causes tearing (top = old frame, bottom = new)
</script>

<script type="text/plain" data-src id="src-rga" data-lang="cpp" data-file="src/cpp_edge/camera_preprocess_rga_zero_copy.cpp">
// zero-copy backend = the DEPLOYED path. Model wants 640 RGB; the camera gives NV12.
// RGA does convert + resize fd-to-fd on hardware; the NPU reads that output directly.
rga_resize_fd_to_fd(src_fd = v4l2_dmabuf,    // camera NV12 buffer, read by fd (no CPU copy)
                    dst_fd = rga_rgb,        // NV12 -> RGB, resize, letterbox, ~0.4 ms
                    NV12 -> RGB)
rknn_set_io_mem(ctx, rga_rgb_fd)             // bind RGA output straight to the NPU: input copy = 0
rknn_run(ctx)                                // rknn_inputs_set_ms = 0 in the live log (~79 ms run)

// Fallback (multi-plane / async / night-enhance): RGA -> rknn_inputs_set, then CPU OpenCV.
// One io-mem binding PER parallel context keeps zero-copy input AND 3-way parallelism.
</script>

<script type="text/plain" data-src id="src-parallel" data-lang="cpp" data-file="src/cpp_edge/main_yolo_pose_rknn_camera.cpp">
// One worker per NPU core, each owning its own RKNN context.
spawn N workers (N = context_count), pin each to an NPU core:
  worker(core):
    ctx = rknn_context_for(core)
    loop:
      job = job_queue.pop()                       // blocks until a frame arrives
      out = run_rknn_frame(ctx, job.nv12_dmabuf)  // RGA NV12->RGB, infer, decode
      results[job.frame_id] = out                 // keyed for in-order reassembly
// the capture thread (A55) feeds the queue; results drain back in frame order
</script>

<script type="text/plain" data-src id="src-postprocess" data-lang="cpp" data-file="src/cpp_edge/yolo_pose_postprocess.cpp">
// Letterbox-aware decode + NMS, isolated from RKNN/camera so it unit-tests alone.
restore_x(x, lb, orig_w):                  // undo letterbox padding, clamp to frame
    return clamp((x - lb.pad_x) / lb.scale, 0, orig_w - 1)

iou(a, b):                                 // standard intersection-over-union
    return overlap_area(a, b) / (area(a) + area(b) - overlap_area(a, b))

// pipeline: decode anchors -> restore coords -> NMS(iou) -> assign track id
</script>

<script type="text/plain" data-src id="src-outputs" data-lang="cpp" data-file="src/cpp_edge/pose_udp_sender.cpp + rtsp_output_server.cpp">
// Output 1: pose over localhost UDP, for fall_service. Datagram shape:
//   { ts, frame_id, w, h, persons:[ { track_id, conf, bbox:[x1,y1,x2,y2], kpts:[[x,y,c] x17] } ] }
send_udp(pose_json, NON_BLOCKING)    // fire-and-forget; a dropped frame is fine,
                                     // the fall state machine integrates over seconds

// Output 2: RTSP, served by THIS process (no second owner of /dev/video12)
appsrc(NV12) -> queue(leaky=downstream) -> mpph264enc -> h264parse -> rtph264pay
rtsp.push_nv12(frame)                // copies into a GStreamer buffer, then returns,
                                     // so QBUF after it returns is safe
</script>

<script type="text/plain" data-src id="src-features" data-lang="cpp" data-file="src/cpp_runtime/fall_detector.cpp">
// Posture from joints, all normalized by frame size (resolution-independent).
body_angle    = atan2(|hip.x - shoulder.x|, |hip.y - shoulder.y|)   // 0=upright 90=flat
bbox_ratio    = bbox_h / bbox_w                                     // < 1 = lying flat
down_velocity = max(d_center_y, d_hip_y) / dt   // skipped if dt looks like an NTP jump

angle_score   = ramp(body_angle, 25 deg  -> 65 deg)
flat_score    = ramp(bbox_ratio, 1.65 -> 0.90)
lying_score   = max(angle_score, flat_score)
</script>

<script type="text/plain" data-src id="src-states" data-lang="cpp" data-file="src/cpp_runtime/fall_detector.cpp">
// Temporal state machine (thresholds shown inline).
NORMAL:
    if lying_now                              -> LYING
    elif fall_score >= 0.42 or sudden_drop    -> WARNING
WARNING:
    if lying_now                              -> LYING
    elif fall_score >= 0.62 and sudden, held >= 0.8 s -> FALL_CONFIRMED
    elif fall_score < 0.30                    -> NORMAL
LYING:
    if floor_level and entry_evidence and lying_ratio >= 0.45, held >= 1.8 s -> FALL_CONFIRMED
    elif not lying for 1 s                    -> NORMAL
FALL_CONFIRMED:                               // latches through brief pose loss
    if low score and not lying, held >= 2 s   -> NORMAL
</script>

<script type="text/plain" data-src id="src-scoring" data-lang="cpp" data-file="src/cpp_runtime/fall_detector.cpp">
// Window-level evidence: one bad frame can never fire an alarm.
fall_score = clamp(
      0.35 * lying_frame_ratio     // most of the window is flat
    + 0.25 * lying_score_mean      // and convincingly so
    + 0.20 * max_down_score        // with a real downward motion
    + 0.10 * center_drop_score     // body lowered across the window
    + 0.10 * angle_change_score    // tilted toward horizontal
    - conf_penalty )               // discount low-confidence poses
</script>

<script type="text/plain" data-src id="src-mqtt" data-lang="cpp" data-file="src/cpp_runtime/fall_service.cpp">
// Publish each state transition exactly once over the local MQTT bus.
publish(topic, payload, retain):
    shell: mosquitto_pub -t topic -m payload [-r]   // board lacks libmosquitto headers

on state change (per tracked person):
    if new_state == FALL_CONFIRMED:
        publish("eldercare/fall/event", { FALL_CONFIRMED, score, reason, ts })
        record_snapshot_async(ts)                   // freeze evidence from the JPEG ring
    elif old_state == FALL_CONFIRMED:
        publish("eldercare/fall/event", { RECOVERED, ... })
</script>

<script type="text/plain" data-src id="src-push" data-lang="cpp" data-file="src/cpp_runtime/alert_service.cpp">
// Notify family via ntfy (plain HTTP over curl, no extra deps on the board).
send(title, body, priority, tags):
    curl -H "Title: ..." -H "Priority: ..." -H "Tags: ..." --data-binary body  <ntfy_url>
    // priority = high when level == sos, so it can reach a silenced phone

send_file(title, snapshot, priority):
    if not exists(snapshot): return false           // snapshot is best-effort:
    curl -X PUT --data-binary @snapshot  <ntfy_url>  // a failed attachment must NOT
                                                    // turn an already-sent alert into a failure
</script>

<script type="text/plain" data-src id="src-aec" data-lang="cpp" data-file="src/audio/audio_aec_duplex.cpp">
// Double-talk gate: real near-end speech (interruption) vs the speaker's own echo.
detect_double_talk(residual, predicted_echo, env, bands):
    if nothing_playing(env): return false           // no echo, no gate needed
    residual_excess         = residual > predicted_echo + margin  and  residual > 2.2*noise
    multi_band_decorrelated = bands.weak >= 2  or  bands.corr_avg < 0.34
    return residual_excess AND multi_band_decorrelated   // both required on this board
// energy alone is fooled by nonlinear residual; correlation alone by weak echo
</script>

<script type="text/plain" data-src id="src-chain" data-lang="cpp" data-file="src/cpp_runtime/voice_service.cpp">
// Offline turn loop after wake. Every stage runs on the device.
if woke: speak("我在。")                       // local neural TTS
loop while session is active:
    audio = capture_vad()                       // Silero VAD endpoints the utterance
    text  = sensevoice_asr(audio)               // offline Chinese -> text
    reply = qwen_llm(text, history)             // llama-server, multi-turn context
    speak(matcha_tts(reply))                    // playback also feeds the AEC reference
// a rolling 15 s window of our own speech rejects late echo instead of repeating it
</script>

<script type="text/plain" data-src id="src-fallans" data-lang="cpp" data-file="src/cpp_runtime/voice_service.cpp">
// Post-fall check-in: a short prompt that allows interruption, then classify.
speak_nowait("您可能摔倒了，您还好吗？")          // non-blocking, so the person can interrupt
text  = asr(capture_vad())                       // reply, mixed with the prompt's echo
level = classify_fall_reply(text)                // ok / sos / unclear

classify_fall_reply(text):
    if any(distress_marker in text):  return "sos"   // 救命 / 起不来 / 疼 / 头晕 ...
    if any(elder_ok_marker  in text): return "ok"    // 我还好 / 我没事 / 能起来 ...
    return "unclear"                                  // silence/echo-only -> caller defaults to SOS
// match only markers the prompt itself cannot contain (do not subtract the prompt)
</script>

<script type="text/plain" data-src id="src-fan" data-lang="sh" data-file="board_src/eldercare-fan-hold.sh">
#!/bin/sh
# Hold the pwm-fan at a quiet speed so the on-board mic stays usable.
# At the stock pwm=100 the fan's broadband noise sits in the 300-3400 Hz speech
# band and raised the mic noise floor about 10x (rms 0.0028 -> 0.028), so a fall
# reply transcribed as empty and the check-in escalated to SOS. Firmware re-asserts
# pwm=100 about every 10 s, so we rewrite a low value every second.
LOW=50
loop every 1 s:
    t = read(soc_thermal)
    if t >= 72 C: hot = 1          # stop forcing low if the SoC warms up
    if t <  66 C: hot = 0          # hysteresis; cpufreq throttling stays active
    if not hot:   write(pwm1, LOW)
</script>

  gr_h3v:{en:"2024",zh:"2024"}, gr_h3l:{en:"\"year one\" of the silver economy: State Council opinion, 26 measures",zh:"银发经济元年：国务院《发展银发经济意见》，26 条举措"},
  bg_narr:{en:"China is aging faster than at any point before. By the end of 2025 the population aged 60 and over reached 323 million, 23.0% of the country, up from 21.1% in 2023; official projections put it above 400 million and more than 30% by 2035. Most older people now live alone or only with a spouse. Falls are the second leading cause of unintentional-injury death worldwide, and older adults account for the largest share of fatal ones. For someone living alone the real danger is often not the fall itself but the long lie that follows, with no one nearby to call for help. The need is growing and so is the market: China's silver economy is projected to expand from about ¥7 trillion today to ¥30 trillion by 2035, and a 2024 State Council opinion made developing it national policy. This project puts fall detection and a voice assistant on the device, so a fall is caught and an alert is sent while video and audio stay local.",zh:"中国正进入老龄化最快的时期。截至 2025 年末，60 岁以上人口达到 3.23 亿，占全国 23.0%，高于 2023 年的 21.1%；官方预测到 2035 年将超过 4 亿、占比超过 30%。多数老人独居或仅与配偶同住。跌倒是全球意外伤害致死的第二大原因，其中老年人占比最高。对独居老人来说，真正的危险往往不是摔倒本身，而是摔倒后长时间躺地、身边无人求助。需求在增长，市场也在扩张：中国银发经济预计从目前约 7 万亿元增长到 2035 年约 30 万亿元，国务院 2024 年的意见已将其上升为国家政策。本项目把跌倒检测和语音助手直接放在设备端，摔倒能被及时发现并报警，视频和音频都留在本地。"},
  bg_src:{en:"Sources: National Bureau of Statistics of China (Jan 2026 for 2025, Jan 2025 for 2024); MCA and the National Working Commission on Ageing (elderly count, disability, empty-nest share); 2035 projection per WHO and State Council statements; WHO falls fact sheet; silver-economy figures per CEIBS and press; fall-detection market growth per Grand View Research, Future Market Insights and others.",zh:"数据来源：国家统计局（2026 年 1 月发布的 2025 年数据，2025 年 1 月发布的 2024 年数据）；民政部、全国老龄办（老年人口、失能半失能、空巢比例）；2035 年人口预测见世界卫生组织及国务院相关表述；世界卫生组织跌倒实况报道；银发经济规模为中欧国际工商学院及媒体引述预测；全球跌倒检测市场增速为 Grand View Research、Future Market Insights 等机构预测。"},

  lede:{en:"ARGUS runs on a single Orange Pi 5 Plus (RK3588). It detects falls from camera pose in real time, and a local voice assistant can check on the person and notify family. All AI runs on the device, so the camera feed and microphone audio never leave the board; the only thing that goes out is the alert to family. Each module below opens into its sub-modules, with a flow chart, the data flow, and an annotated implementation sketch.",
        zh:"ARGUS 跑在一块香橙派 5 Plus（RK3588）上：用摄像头识别人体姿态、实时判断有没有摔倒，再由本地语音助手主动问一句、必要时通知家人。所有 AI 都在本地跑，画面和声音都不出板；唯一对外发送的，是摔倒后给家人的那条报警。点开下面任意一个模块，就能看到它的子模块、流程图、数据流，以及一段带注释的实现示意。"},

  lld_h:{en:"Why 640 + 3 cores + enhancement, not 384",zh:"为什么是 640 + 3 核 + 增强，而不是 384"},
  skel_cap:{en:"Same enhanced low-light frame, two models. Left: the lighter, faster 384 model finds nobody (people=0, even after enhancement). Right: the 640 model detects the fallen person at 0.76 with a 17-point pose skeleton. So rather than drop to a faster-but-weaker 384, the deployment keeps 640 and recovers the frame rate with 3 parallel NPU cores (~15 fps, 0 dropped); night enhancement here is an evaluated optional aid, not the run_pose_camera.sh default. (The ~80 ms on the 640 frame is one core in isolation; production runs 3 cores in parallel, so a slow single frame still yields ~15 fps.)",zh:"同一张增强后的弱光帧，两个模型。左：更轻、更快的 384 模型检测不到人（people=0，即便增强后也是）；右：640 模型检出躺倒的人（0.76）并画出 17 点骨架。所以没有退到更快但更弱的 384，而是保留 640、用 3 个并行 NPU 核把帧率追回来（约 15fps、0 丢帧）；这里的夜间增强是评估用的可选增益，不是 run_pose_camera.sh 的默认。（上图 640 的约 80ms 是单核独占的单帧；部署时 3 核并行，所以单帧慢、整机仍约 15fps。）"},
  ab_title:{en:"Shrink exposure for fps, recover recall with enhancement (35 clips, measured)",zh:"为提帧率缩曝光，用夜间增强把召回补回来（35 段实测）"},
  ab_note:{en:"To lift night fps from 8 to 15 we must shorten exposure; a shorter exposure is a darker frame and fewer detections. Dimming the 35 eval snapshots to 1/2 and 1/3 exposure: the 640 model falls from 100% to 88.6% and night enhancement brings it back to 94.3%. The lighter 384 model falls more (77% to 69%); enhancement lifts its 1/3-exposure case from 68.6% to 82.9%. Enhancement only fires on dark frames (luma<70), so the full-exposure bars are identical. This whole low-light path is an evaluated optional flag, not the production default in run_pose_camera.sh.",zh:"为把夜间帧率从 8 提到 15，必须缩短曝光；曝光越短画面越暗、检出越少。把 35 段评测快照压到 1/2、1/3 曝光后：640 从 100% 掉到 88.6%，夜间增强把它拉回 94.3%；更轻量的 384 掉得更多（77% 到 69%），增强把它 1/3 曝光这档从 68.6% 救回 82.9%。增强只在画面暗（luma<70）时触发，所以全曝光那档两根柱一样高。这条弱光路径整体是评估用的可选开关，不是 run_pose_camera.sh 里的生产默认。"},

      why:{en:"The point of V4L2 here is not just getting an image, it is getting the underlying buffer plus a DMA-BUF fd. The device is opened single-plane first: in NV12 the Y and UV sit in one buffer, so a single DMA-BUF fd is the whole frame, which is what makes a true fd-to-fd path possible; if the device only offers VIDEO_CAPTURE_MPLANE the code falls back to multi-plane (Y and UV as separate planes). The pool is 8 deep because 3 parallel RKNN contexts may hold several DQBUF'd frames at once; too few buffers and the driver has nowhere to write the next frame and stalls. The driver allocates them, not malloc or OpenCV. (The flicker when someone approached was fixed one layer up, in the ISP IQ tuning.)",
           zh:"这里用 V4L2 的意义不只是拿一张图，而是拿到底层 buffer 加一个 DMA-BUF fd。设备优先以 single-plane 打开：NV12 下 Y 和 UV 在同一块 buffer 里，所以一个 DMA-BUF fd 就是一整帧，这正是能走真正 fd-to-fd 路径的前提；如果设备只给 VIDEO_CAPTURE_MPLANE，代码就回退到多平面（Y、UV 分成两个面）。池子做到 8 个，是因为 3 个并行 RKNN 上下文可能同时 hold 住好几帧；buffer 太少，驱动就没地方写下一帧，会卡住。buffer 是驱动分配的，不是 malloc 也不是 OpenCV。（有人靠近时画面闪那个问题，是在上游的 ISP IQ 调校里修掉的。）"} },

    { id:"features", code:"features",
      name:{en:"Feature extraction",zh:"特征提取"},
      summary:{en:"Per-frame body angle, box flatness, vertical center and downward velocity, normalized.",zh:"逐帧算出身体角度、框扁平度、竖直中心和下落速度，并统一做归一化。"},
      flow:[
        {t:"17 COCO keypoints", d:{en:"shoulders, hips, knees, ankles",zh:"肩、髋、膝、踝"}},
        {t:"body_angle", d:{en:"atan2(|dx|, |dy|) shoulder->hip",zh:"atan2（|dx|, |dy|） 肩->髋"}},
        {t:"bbox_ratio = h / w", d:{en:"< 1 means flat / lying",zh:"< 1 表示扁平/躺地"}},
        {t:"down_velocity", d:{en:"d_center_y / dt (clock-jump guarded)",zh:"d_center_y / dt（防时钟跳变）"}},
        {t:"lying_score", d:{en:"max(angle_score, flat_score)",zh:"max（angle_score, flat_score）"}}
      ],
      df:{in:["17 keypoints","bbox","timestamp"], proc:["angle","flatness","velocity","normalize by frame"], out:["per-frame Features"]},
      why:{en:"Every value is divided by frame size, so changing the camera from 384 to 640 does not require retuning thresholds. center_y is the vertical body center: the closer to the bottom of the frame, the closer the person is to the floor, which separates a real fall from sitting or bending. Low-confidence keypoints are down-weighted rather than trusted blindly. Velocity is guarded against NTP clock jumps: when the wall clock corrects, the frame's posture is kept but its velocity is discarded.",
           zh:"所有量都按画面尺寸做了归一化，所以相机从 384 换成 640，阈值一个都不用改。center_y 是人体竖直中心：越靠近画面底部，人离地面越近，这能把真摔倒和坐下、弯腰区分开。关键点置信度低时会被降权，而不是盲目采信。速度还专门防了 NTP 校时跳变：系统时钟被校正的那一帧，姿态照常保留，只把算出来的速度丢掉。"} },
    { id:"states", code:"states", customFlow:"states",
      name:{en:"State machine",zh:"状态机"},
      summary:{en:"NORMAL, WARNING, LYING, FALL_CONFIRMED, with timed recovery back to NORMAL.",zh:"四个状态 NORMAL、WARNING、LYING、FALL_CONFIRMED，并按计时退回 NORMAL。"},
      df:{in:["fall_score","lying_score","floor_level","entry evidence"], proc:["state transitions","sustained timers","latch + recovery"], out:["state","alert = (state == FALL_CONFIRMED)"]},
      why:{en:"Confirmation requires lying posture, a floor-level center, and entry evidence (a real drop or a prior WARNING) sustained for at least 1.8 s. FALL_CONFIRMED then latches through brief pose loss, so a person lying still, where keypoints are often lost, stays an alarm rather than clearing.",
           zh:"要确认摔倒，得同时满足三点：躺姿、人体中心贴近地面、以及有“进入证据”（一次真实下落，或之前进过 WARNING），并且持续 1.8 秒以上。确认之后 FALL_CONFIRMED 会锁存，姿态短暂丢失也不解除；这样老人躺着不动、关键点经常丢的时候，报警依然保持。"} },
    { id:"scoring", code:"scoring",
      name:{en:"Window scoring",zh:"窗口评分"},
      summary:{en:"A window-level weighted score, so a single noisy frame cannot raise an alarm.",zh:"窗口级加权评分，单帧噪声无法触发报警。"},
      flow:[
        {t:"2.5 s window", d:{en:"recent frames only",zh:"仅最近若干帧"}},
        {t:"5 signals", d:{en:"lying ratio, lying mean, down, drop, angle change",zh:"躺比例、躺均值、下落、位移、角度变化"}},
        {t:"weighted sum", d:{en:"0.35 / 0.25 / 0.20 / 0.10 / 0.10",zh:"0.35 / 0.25 / 0.20 / 0.10 / 0.10"}},
        {t:"- conf_penalty", d:{en:"low-confidence poses discounted",zh:"低置信姿态被折扣"}},
        {t:"fall_score in [0,1]", d:{en:"feeds the state machine",zh:"喂给状态机"}}
      ],
      df:{in:["window of Features"], proc:["aggregate 5 signals","weighted blend","penalize low conf"], out:["fall_score","debug telemetry"]},
      why:{en:"In a 60-clip field test on 2026-06-21 it caught 58 of 60 falls (97% recall) with 1 false alarm (1.7%). The clips mix fast falls, slow slides, and everyday distractors like bending, sitting and walking. Both misses and the false alarm happened in low light, and the two misses were slow slides, where the descent is gentle and the pose is hard to hold. In normal light it caught every fall with no false alarm; night recall was 18 of 20 (90%). Low light is the explicit known limitation, still being improved with the 640 model and ISP night tuning. The trade-off is deliberate: a missed fall costs far more than a false alarm, so it is tuned recall-first. Time from the fall to the alert averages about 3 s on fast falls, measured from the floor moment, not the clip start.",
           zh:"2026-06-21 的一次 60 段实测：60 个跌倒命中 58（召回 97%），误报 1 次（1.7%）。这 60 段混了快速跌倒、缓慢下滑，以及弯腰、坐下、行走这类日常干扰动作。漏掉的 2 个和那次误报都发生在夜光下，而且漏的两个都是缓慢下滑：下坠轻、姿态难稳住。常光下每个跌倒都抓到、没有误报；夜光召回为 20 个里 18 个（90%）。夜光是明确的已知局限，仍在用 640 模型和 ISP 夜间调校改进。这个取舍是刻意的：漏报的代价远大于误报，所以按召回优先来调。从倒地到报警，快速跌倒平均约 3 秒，从倒地那一刻算，不是从录像开头。"} },
    { id:"reliability", code:"reliability",
      name:{en:"Reliability fixes",zh:"可靠性修复"},
      summary:{en:"Field-driven guards so a clock jump, a dead network, or a voice prompt never swallows a real fall.",zh:"几个实战兜底：时钟跳变、断网、或正在播报，都不该吞掉一次真实跌倒。"},
      flow:[
        {t:"NTP dt guard", d:{en:"clock corrects -> keep posture, drop velocity",zh:"时钟校正 -> 留姿态，弃速度"}},
        {t:"alert before speech", d:{en:"publish FALL_CONFIRMED before the TTS prompt",zh:"先发 FALL_CONFIRMED，再播 TTS"}, edge:{en:"order",zh:"顺序"}},
        {t:"fall preempts VAD", d:{en:"a pending fall interrupts a voice capture",zh:"待确认跌倒打断语音录制"}}
      ],
      df:{in:["clock jump","network down","mid-capture fall"], proc:["dt guard","decouple alert from TTS","preempt VAD"], out:["no false drop","alert still sent","fall not delayed"]},
      why:{en:"These are not features, they are bugs found in the field and fixed. An NTP correction used to spike downward velocity into a false fall; now the frame's posture is kept and only its velocity is discarded. The MQTT alert is published before the voice prompt, so a dead network or a slow TTS never blocks the caregiver notification. And a fall confirmed mid-conversation preempts the voice capture, so the system never finishes a chat before reacting to a fall.",
           zh:"这些不是功能，是现场踩出来、再修掉的 bug。NTP 校时曾经把下落速度冲出一个假摔倒；现在那一帧姿态保留，只丢掉速度。MQTT 报警在语音播报之前就发出去，所以断网或 TTS 卡顿都不会挡住给看护人的通知。对话进行中确认的跌倒会抢占语音录制，系统绝不会先把天聊完再去管摔倒。"} }
  ]
},
{
  id:"alert", color:"alert",
  name:{en:"Alerting",zh:"报警"}, name2:{en:"MQTT and family notification",zh:"MQTT 与家人通知"},
  tag:{en:"Once a fall is confirmed, the family is pushed within seconds.",zh:"摔倒一旦确认，几秒内推送到家人手机。"},
  file:"src/cpp_runtime/alert_service.cpp",
  overview:{en:"A local MQTT broker separates detection from delivery. The fall service publishes one transition event; the alert service subscribes, takes a snapshot from the JPEG ring, and sends a push notification over ntfy. Every attempt is logged.",
            zh:"用一个本地 MQTT broker 把“检测”和“通知”解耦开：跌倒服务只发一条状态变化事件，报警服务订到之后，从 JPEG 环里取一张快照，再通过 ntfy 推给家人。每一次推送都会记进日志。"},
  demo:{
    title:{en:"From the field: what the family receives",zh:"实拍：家人手机收到的推送"},
    note:{en:"Real ntfy pushes from a board test on 2026-06-20. The same fall, two outcomes, decided by the voice check-in.",zh:"2026-06-20 板子实测时，家人手机真实收到的 ntfy 推送。同样一次摔倒，两种结局，由语音问询决定。"},
    shots:[
      {img:"assets/demo-fall-ok.jpg", cap:{en:"Reply \"I'm fine\" -> resolved (ok), normal priority",zh:"回答“我还好” -> 已报平安（ok），普通优先级"}},
      {img:"assets/demo-fall-sos.jpg", cap:{en:"Reply \"help\" -> needs help (sos), high priority",zh:"回答“救命” -> 需要帮助（sos），高优先级"}}
    ]
  },
  subs:[
    { id:"bus", code:"mqtt",
      name:{en:"MQTT bus",zh:"MQTT 总线"},
      summary:{en:"MQTT topics carry state and events; each transition is published once.",zh:"状态和事件都走 MQTT 主题，每次状态变化只发一条。"},
      flow:[
        {t:"fall_detector", d:{en:"state -> FALL_CONFIRMED",zh:"状态 -> FALL_CONFIRMED"}},
        {t:"publish_event", d:{en:"eldercare/fall/event",zh:"eldercare/fall/event"}, edge:{en:"once",zh:"仅一次"}},
        {t:"mosquitto broker", d:{en:"local, retained state topic",zh:"本地，保留态主题"}},
        {t:"alert_service", d:{en:"subscribes and reacts",zh:"订阅并响应"}}
      ],
      df:{in:["FallResult transition"], proc:["dedupe by prev_state","mosquitto_pub","record snapshot"], out:["MQTT event","MQTT retained state"]},
      why:{en:"Four topics carry the system: eldercare/fall/event ({event, ts, score, reason}, fired once per transition, not retained), eldercare/fall/state ({state, fall_score, ts}, retained), eldercare/vision/health ({alive, fps, ts}, retained), and eldercare/alert/request ({level} = ok / sos / confirmed, from the voice check-in). The board has the mosquitto_pub CLI but not the libmosquitto headers, so publishing runs through the CLI. Because the broker is the interface, the vision, fall, alert and voice services can each restart independently.",
           zh:"四个主题撑起整个系统：eldercare/fall/event（{event, ts, score, reason}，每次状态跳变发一次，不保留）、eldercare/fall/state（{state, fall_score, ts}，保留）、eldercare/vision/health（{alive, fps, ts}，保留）、eldercare/alert/request（{level} = ok / sos / confirmed，来自语音问询）。板子上只有 mosquitto_pub 命令行，没有 libmosquitto 头文件，所以用命令行发消息。因为大家都只认 broker 这个接口，视觉、跌倒、报警、语音几个服务可以各自单独重启，互不影响。"} },
    { id:"push", code:"push",
      name:{en:"Family notification (ntfy)",zh:"家人通知（ntfy）"},
      summary:{en:"An ntfy push plus a best-effort snapshot attachment, with an audit log.",zh:"一条 ntfy 推送，外加一张尽力而为的快照附件，全程有日志可查。"},
      flow:[
        {t:"alert request", d:{en:"level = ok / sos",zh:"级别 = ok / sos"}},
        {t:"find_event_snapshot", d:{en:"newest JPEG from the ring",zh:"从环中取最新 JPEG"}},
        {t:"curl -> ntfy", d:{en:"Title / Priority / Tags",zh:"Title / Priority / Tags"}, edge:{en:"sos -> high",zh:"sos -> 高优先"}},
        {t:"PUT snapshot", d:{en:"image attachment",zh:"图片附件"}},
        {t:"JSONL audit log", d:{en:"every attempt recorded",zh:"记录每次尝试"}}
      ],
      df:{in:["alert level","fall ts"], proc:["snapshot lookup","ntfy push","attach image","append JSONL"], out:["family notification","audit record"]},
      why:{en:"The snapshot is best-effort: a missing or failed upload does not turn a sent alert into a failed one. Priority scales with severity: a check-in ok is default priority, a confirmed fall is high, and an SOS is urgent so it can wake a silenced phone. Cooldowns are per level, so repeated voice retries of the same level are damped without dropping a genuine escalation. The audit log records every suppressed or failed push.",
           zh:"快照是尽力而为：就算没取到或上传失败，也不会让一条已经发出去的报警算作失败。优先级随严重程度递增：问询 ok 用普通优先级（default）,confirmed 确认跌倒用 high,SOS 用 urgent，好让静音的手机也能响。冷却按级别分别计，所以同一级别的语音重试会被抑制，但真正的升级不会被丢掉。日志里会记下每一次被拦下或失败的推送，方便事后排查。"} },
    { id:"offline", code:"offline",
      name:{en:"Network-down strategy",zh:"断网策略"},
      summary:{en:"Local first: detection, logging and the voice check-in never depend on the cloud; the family push is best-effort.",zh:"本地优先：检测、记录、语音问询都不依赖云端；给家人的推送是尽力而为。"},
      flow:[
        {t:"fall confirmed", d:{en:"local MQTT + JSONL, always",zh:"本地 MQTT + JSONL，总会发生"}},
        {t:"voice check-in", d:{en:"runs offline on the board",zh:"在板子本地离线进行"}},
        {t:"ntfy push", d:{en:"curl --max-time 20 --retry 2",zh:"curl --max-time 20 --retry 2"}, edge:{en:"best-effort",zh:"尽力而为"}},
        {t:"health watch", d:{en:"stale -> system-offline alert",zh:"心跳超时 -> 系统掉线告警"}}
      ],
      df:{in:["fall / sos","network state"], proc:["local publish + log","bounded curl retry","health stale check"], out:["local record always","remote push if reachable"]},
      why:{en:"For an eldercare device the order of priority matters more than the push itself. The fall decision, the MQTT event and the JSONL log are entirely local and happen whether or not the network is up; the voice check-in is on-device too. Only the family notification leaves the board, and it is best-effort: curl is bounded to 20 s with 2 retries so a dead network cannot block the pipeline, and every failed push is logged. If the vision health feed goes stale, the alert service raises a system-offline notice instead of staying silent.",
           zh:"对一台养老设备，优先级的顺序比推送本身更重要。跌倒判定、MQTT 事件、JSONL 日志全在本地，不管有没有网都会发生；语音问询也在板子上离线完成。只有给家人的通知会出板，而且是尽力而为：curl 限时 20 秒、重试 2 次，断网也卡不住流水线，每次失败都记日志。如果视觉心跳变陈旧，报警服务会主动发一条系统掉线提醒，而不是闷着不响。"} }
  ]
},
{
  id:"voice", color:"voice",
  name:{en:"Voice assistant",zh:"语音助手"}, name2:{en:"offline, full-duplex",zh:"离线全双工"},
  tag:{en:"An offline assistant that checks on the person and avoids hearing itself.",zh:"全离线的语音助手，会主动问情况，也不会把自己说的话当成输入。"},
  file:"src/cpp_runtime/voice_service.cpp",
  overview:{en:"A fully offline, full-duplex assistant: wake word, on-device ASR, a local LLM, and neural TTS. Echo cancellation keeps it from transcribing its own output, while a real person can still interrupt over the speaker. After a fall it asks whether the person is all right and decides whether to escalate.",
            zh:"一个完全离线、全双工的语音助手：唤醒词、端侧 ASR、本地 LLM、神经网络 TTS，整条链路都在本地。回声消除让它不会把自己播出去的话又录回来当输入，但真人还是能盖过喇叭把它打断。摔倒之后，它会主动问一句人有没有事，再决定要不要升级求助。"},
  subs:[
    { id:"aec", code:"aec",
      name:{en:"Echo cancellation (AEC)",zh:"回声消除（AEC）"},
      summary:{en:"PipeWire full-duplex with speex AEC and a double-talk gate.",zh:"PipeWire 全双工，speex AEC 加双讲门。"},
      flow:[
        {t:"playback x -> ref_ring", d:{en:"playback feeds the reference",zh:"播放信号喂入参考"}},
        {t:"mic d", d:{en:"near-end + echo + noise",zh:"近端 + 回声 + 噪声"}},
        {t:"speex_echo_cancellation", d:{en:"linear echo removed -> residual",zh:"消去线性回声 -> 残差"}},
        {t:"detect_double_talk", d:{en:"residual_excess && multi_band_decorrelated",zh:"residual_excess && multi_band_decorrelated"}, edge:{en:"both required",zh:"两者皆需"}},
        {t:"gate open / closed", d:{en:"real speech passes, TTS echo blocked",zh:"真人通过，TTS 回声拦截"}}
      ],
      df:{in:["mic frame","playback reference"], proc:["speex AEC","residual energy","cross-band correlation"], out:["clean near-end OR muted"]},
      why:{en:"The loudspeaker echo on this board is weakly correlated, so an energy-only gate is fooled by nonlinear residual and a correlation-only gate is fooled by the weak echo. The gate requires both a residual-energy excess and multi-band decorrelation, which suppresses the assistant's own TTS while still allowing a real interruption. A few implementation details matter on this board: PipeWire's own module-echo-cancel misaligns reference and capture, so this is a standalone speexdsp MDF canceller on one shared clock; the reference-ring mutex uses PTHREAD_PRIO_INHERIT so the realtime audio thread never priority-inverts; PCM is written to stdout non-blocking, so a slow reader drops frames instead of stalling capture; and a --dtd-self-test mode validates the double-talk detector offline.",
           zh:"这块板子的喇叭回声相关性很弱：只看能量，会被非线性残差骗；只看相关性，又会被弱回声骗。所以这道门要求“残差能量超标”和“多频带不相关”两个条件同时成立，既压得住助手自己的 TTS，又放得进真人插话。"} },
    { id:"chain", code:"chain",
      name:{en:"Wake / ASR / LLM / TTS",zh:"唤醒 / ASR / LLM / TTS"},
      summary:{en:"KWS wake-word, Silero VAD, SenseVoice ASR, Qwen2.5-1.5B (llama.cpp) and MeloTTS (Matcha/Piper fallback), all on the board.",zh:"KWS 唤醒词、Silero VAD、SenseVoice ASR、Qwen2.5-1.5B（llama.cpp）和 MeloTTS（Matcha/Piper 兜底），全部在板上。"},
      flow:[
        {t:"KWS wake-word", d:{en:"sherpa-onnx zipformer (zh-en)",zh:"sherpa-onnx zipformer（中英）"}},
        {t:"Silero VAD", d:{en:"endpoint the utterance",zh:"切出一句话"}},
        {t:"SenseVoice ASR", d:{en:"offline Chinese -> text",zh:"离线中文 -> 文本"}},
        {t:"Qwen2.5-1.5B", d:{en:"llama.cpp, local :8081, multi-turn",zh:"llama.cpp，本地 :8081，多轮"}},
        {t:"MeloTTS -> playback", d:{en:"Matcha/Piper fallback; also feeds AEC reference",zh:"Matcha/Piper 兜底；并喂回 AEC 参考"}, edge:{en:"loop",zh:"回路"}}
      ],
      df:{in:["mic audio"], proc:["VAD","ASR","local LLM","TTS"], out:["spoken reply","reference for AEC"]},
      why:{en:"No audio leaves the board. The local LLM is a real Qwen2.5-1.5B served by llama.cpp on :8081, not a canned fallback, and TTS is MeloTTS (sherpa-onnx vits) with Matcha, Piper and an espeak path as fallbacks. The C++ port restored a multi-turn session (wake once, then continue) that an earlier build had dropped. Endpoints are tuned for elders: it wakes after 520 ms of trailing silence and ends a user turn after 1000 ms; an active session stays open 90 s before dropping back to wake mode, and recorded audio is capped at 512 MB with a 24 h TTL.",
           zh:"音频一点都不出板子。本地大模型是 llama.cpp 跑的 Qwen2.5-1.5B，不是写死的兜底回复；TTS 是 MeloTTS（sherpa-onnx vits），Matcha、Piper 和 espeak 作为兜底。C++ 版本还补回了早期弄丢的多轮对话（唤醒一次就能接着聊）。端点按老人节奏：尾静音 520 ms 触发唤醒、用户一句话静音 1000 ms 结束，活跃会话保持 90 秒再退回唤醒模式，录下的音频上限 512 MB、保留 24 小时。"} },
    { id:"fallans", code:"fallans",
      name:{en:"Post-fall check-in",zh:"跌倒后问询"},
      summary:{en:"A short prompt that allows interruption, then classification into ok / sos / unclear.",zh:"一句允许打断的短提示，再分类为 ok / sos / unclear。"},
      flow:[
        {t:"FALL event", d:{en:"publish confirmed first",zh:"先发布 confirmed"}},
        {t:"speak_local_nowait", d:{en:"short, classify-neutral prompt",zh:"短的、对分类中性的提示"}, edge:{en:"non-blocking",zh:"非阻塞"}},
        {t:"capture_vad -> ASR", d:{en:"reply, mixed with echo",zh:"回答，混有回声"}},
        {t:"classify_fall_reply", d:{en:"match echo-proof markers only",zh:"只匹配防回声的标记词"}},
        {t:"reassure / escalate", d:{en:"ok -> calm · sos/unclear -> family",zh:"ok -> 安抚 · sos/unclear -> 家人"}}
      ],
      df:{in:["fall event","mic reply"], proc:["short prompt + interruption","ASR","marker classify","re-ask once"], out:["ok / sos to alert path","spoken response"]},
      why:{en:"The prompt is about 2 s and word-neutral on purpose. The live AEC does not fully cancel the speaker, and a long prompt buried the reply under echo so ASR returned nothing. The classifier does not subtract the prompt (that once removed the person's own '我还好' and produced a false SOS); it matches only markers the prompt cannot contain. Silence defaults to SOS.",
           zh:"提示特意压到 2 秒左右，而且用词中性。实时 AEC 没法把喇叭完全消掉，提示一长，回答就被回声盖住，ASR 直接返回空。分类时不去“减掉提示原文”（以前这么做，把老人自己说的“我还好”也一起删了，结果误报成 SOS），只匹配那些提示里绝不可能出现的词。没听到回应，就默认按 SOS 处理。"} },
    { id:"selftalk", code:"selftalk",
      name:{en:"Self-talk loop fix",zh:"自言自语回路修复"},
      summary:{en:"Stops the assistant from transcribing its own speech back as a new request.",zh:"防止助手把自己说过的话又转写成一条新请求。"},
      flow:[
        {t:"rolling speech window", d:{en:"last ~15 s of what it said",zh:"它最近约 15 秒说过的话"}},
        {t:"LCS overlap match", d:{en:"new capture vs recent speech",zh:"新采集 vs 最近说过的"}},
        {t:"preface echo reject", d:{en:"drop fixed story / joke prefaces",zh:"丢掉固定的讲故事/笑话开场"}},
        {t:"short fragment drop", d:{en:"Silero<0.5 and <=2 CJK -> noise",zh:"Silero<0.5 且 CJK<=2 -> 噪声"}}

/* split a raw line into [code, comment] without breaking on quotes */
function splitComment(line, lang){
  const hash = (lang!=="cpp");
  let q=null;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(q){ if(c===q && line[i-1]!=="\\") q=null; continue; }
    if(c==='"'||c==="'"){ q=c; continue; }
    if(!hash && c==="/" && line[i+1]==="/") return [line.slice(0,i), line.slice(i)];
    if(hash && c==="#") return [line.slice(0,i), line.slice(i)];
  }
  return [line,""];
}

function codeBlock(id){
  const el=document.getElementById("src-"+id);
  if(!el) return "";
  const lang=el.dataset.lang||"cpp", file=el.dataset.file||"";
  let raw=el.textContent.replace(/^\n+/,"").replace(/\s+$/,"");
  const lines=raw.split("\n").map(ln=>{
    const [code,comment]=splitComment(ln,lang);
    const html=esc(code)+(comment?'<span class="cmt">'+esc(comment)+"</span>":"");
    return '<span class="cl">'+(html.length?html:"&nbsp;")+"</span>";
  }).join("");
  return '<div class="code"><div class="cfile"><span>'+esc(file)+'</span><span class="lang">'+tr(T.pseudo)+'</span></div><pre><code>'+lines+"</code></pre></div>";
}

/* generic vertical flow chart */
function flowSvg(steps, color){
  const W=560, bh=58, gap=42, pad=4;
  const H=steps.length*bh+(steps.length-1)*gap+pad*2;
  const cx=W/2;
  let y=pad, out=['<svg viewBox="0 0 '+W+' '+H+'" class="flow" preserveAspectRatio="xMidYMin meet">'];
  steps.forEach((s,i)=>{
    if(i>0){
      const ya=y-gap, yb=y;
      out.push('<line class="fln" x1="'+cx+'" y1="'+(ya+3)+'" x2="'+cx+'" y2="'+(yb-9)+'" marker-end="url(#fa)"/>');
      if(s.edge) out.push('<text class="fedge" x="'+(cx+12)+'" y="'+((ya+yb)/2+3)+'">'+esc(tr(s.edge))+"</text>");
    }
    out.push('<g><rect class="fbox" x="2" y="'+y+'" width="'+(W-4)+'" height="'+bh+'" style="stroke:var(--'+color+')"/>');
    out.push('<text class="ft" x="18" y="'+(y+24)+'">'+esc(s.t)+"</text>");
    out.push('<text class="fd" x="18" y="'+(y+44)+'">'+esc(tr(s.d))+"</text></g>");
    y+=bh+gap;
  });
  out.push("</svg>");
  return out.join("");
}

    arr.forEach(x=>{ h+='<span class="pill k">'+esc(x)+"</span>"; });

  };

}

function demoBlock(d, color){

function panel(titleKey, color, inner){

// wrapping caption inside an SVG (SVG <text> does not wrap; foreignObject does)
function svgCap(x,y,w,h,o,size){
  return '<foreignObject x="'+x+'" y="'+y+'" width="'+w+'" height="'+(h||44)+'"><div xmlns="http://www.w3.org/1999/xhtml" style="font:'+(size||12.5)+'px/1.4 Inter,system-ui,sans-serif;color:#6f655b">'+esc(tr(o))+'</div></foreignObject>';
}

function abChart(){
  var groups=[{l:{en:"full exposure",zh:"全曝光"}},{l:{en:"1/2 exposure",zh:"1/2 曝光"}},{l:{en:"1/3 exposure",zh:"1/3 曝光"}}];
  var data={"640":[[100,100],[94.3,94.3],[88.6,94.3]],"384":[[77.1,77.1],[74.3,85.7],[68.6,82.9]]};
  var cx=[170,360,550];
  function panel(model,top,title){
    var base=top+168, scale=1.32;
    var s='<text x="28" y="'+(top+16)+'" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#33302b">'+esc(title)+'</text>';
    s+='<line x1="40" y1="'+base+'" x2="650" y2="'+base+'" stroke="#e9e0d3"/>';
    data[model].forEach(function(pair,gi){
      var c=cx[gi];
      [["#c2a48a",pair[0],-42],["#3f8f6b",pair[1],6]].forEach(function(b){
        var v=b[1], h=v*scale, x=c+b[2], y=base-h;
        s+='<rect x="'+x+'" y="'+y.toFixed(1)+'" width="36" height="'+h.toFixed(1)+'" rx="4" fill="'+b[0]+'"/>';
        s+='<text x="'+(x+18)+'" y="'+(y-5).toFixed(1)+'" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#6f655b">'+Math.round(v)+'%</text>';
      });
      s+='<text x="'+c+'" y="'+(base+18)+'" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6f655b">'+esc(tr(groups[gi].l))+'</text>';
    });
    return s;
  }
  return '<svg role="img" viewBox="0 0 680 500" width="100%" xmlns="http://www.w3.org/2000/svg">'+

    panel("640",30,tr({en:"640 model · detection rate",zh:"640 模型 · 检出率"}))+

  var st=[[{en:"KWS wake",zh:"KWS 唤醒"},0,0.2,"#4f86a8"],[{en:"ASR (SenseVoice)",zh:"ASR（SenseVoice）"},0.2,0.35,"#3f8f6b"],[{en:"LLM first clause",zh:"LLM 首句"},0.55,1.1,"#e08a4a"],[{en:"TTS (MeloTTS)",zh:"TTS（MeloTTS）"},1.65,1.0,"#9b7bb0"]];
  var total=2.65,x0=150,w=460;
  var rows=st.map(function(s,i){var x=x0+s[1]/total*w,bw=s[2]/total*w,y=18+i*32;return '<text x="'+(x0-10)+'" y="'+(y+15)+'" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11.5" fill="#6f655b">'+t2(s[0])+'</text><rect x="'+x.toFixed(1)+'" y="'+y+'" width="'+bw.toFixed(1)+'" height="22" rx="4" fill="'+s[3]+'"/><text x="'+(x+bw+6).toFixed(1)+'" y="'+(y+16)+'" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6f655b">'+s[2].toFixed(2)+'s</text>';}).join("");
  return '<svg role="img" viewBox="0 0 680 174" width="100%" xmlns="http://www.w3.org/2000/svg"><title>'+t2({en:"voice latency waterfall",zh:"语音延迟瀑布"})+'</title>'+rows+svgCap(12,142,656,30,{en:"Wake to first spoken clause ~2.6 s; the LLM first clause (~1.1 s) is the bottleneck. Measured from voice.log.",zh:"从唤醒到第一句出声约 2.6s；LLM 首句（~1.1s）是瓶颈。数据来自 voice.log。"},12)+'</svg>';
}

function subView(m,s){
  const idx=m.subs.findIndex(x=>x.id===s.id);
  const prev=m.subs[idx-1], next=m.subs[idx+1];
  const flow = s.customFlow==="states" ? stateMachineSvg() : (s.flow ? flowSvg(s.flow,m.color) : "");
  let nav='<div class="subnav">';
  nav+= prev ? '<a href="#/'+m.id+"/"+prev.id+'">← '+esc(tr(prev.name))+"</a>" : '<a href="#/'+m.id+'">↑ '+esc(tr(m.name))+"</a>";
  nav+= next ? '<a href="#/'+m.id+"/"+next.id+'">'+esc(tr(next.name))+" →</a>" : '<a href="#/'+m.id+'">'+tr(T.subs)+" ↑</a>";
  nav+="</div>";
  return ''+
    '<div class="crumb"><a href="#/">'+tr(T.home)+'</a><span>›</span><a href="#/'+m.id+'">'+esc(tr(m.name))+'</a><span>›</span>'+esc(tr(s.name))+"</div>"+
    "<section style='padding-top:14px'>"+
      '<div class="mhead" style="--bd:var(--'+m.color+')">'+
        "<h1>"+esc(tr(s.name))+"</h1>"+
        '<p class="tag">'+esc(tr(s.summary))+"</p>"+
      "</div>"+
      (flow?panel("flow",m.color,flow):"")+
      (s.df?panel("data",m.color,dataFlow(s.df)):"")+
      panel("impl",m.color,codeBlock(s.code))+
      panel("why",m.color,'<p class="why">'+esc(tr(s.why))+"</p>")+
      nav+
    "</section>";
}

/* ---------- router ---------- */
function render(){
  renderNav();
  document.documentElement.lang = L()==="zh" ? "zh-CN" : "en";
  document.getElementById("lang-en").classList.toggle("on",L()==="en");
  document.getElementById("lang-zh").classList.toggle("on",L()==="zh");
  document.getElementById("foot").textContent = tr(T.foot);
  var bs=document.getElementById("brandsub"); if(bs) bs.textContent = tr(T.brand_sub);

  const parts=location.hash.replace(/^#\/?/,"").split("/").filter(Boolean);
  const app=document.getElementById("app");
  if(parts.length===0){ app.innerHTML=home(); window.scrollTo(0,0); return; }
  const m=DATA.find(x=>x.id===parts[0]);
  if(!m){ app.innerHTML=home(); return; }
  if(parts.length===1){ app.innerHTML=moduleView(m); window.scrollTo(0,0); return; }
  const s=m.subs.find(x=>x.id===parts[1]);
  if(!s){ app.innerHTML=moduleView(m); window.scrollTo(0,0); return; }
  app.innerHTML=subView(m,s); window.scrollTo(0,0);
}

window.addEventListener("hashchange",render);
render();
