<!-- =============== IMPLEMENTATION SKETCHES (annotated pseudocode; full source is in a private repo) =============== -->
<script type="text/plain" data-src id="src-boot" data-lang="sh" data-file="systemd/eldercare-vision.service + run_pose_camera.sh + main()">
# systemd unit: pin to the A76 cores, enable RTSP, run the launcher
[Service]
CPUAffinity=4 5 6 7
Environment=RTSP_OUTPUT_ENABLE=1
ExecStart=.../run_pose_camera.sh

# run_pose_camera.sh: ONE process owns the camera and the whole AI path
taskset -c 4-7 main_yolo_pose_rknn_camera \
    --model yolov8n-pose.rknn --camera-device /dev/video12 \
    --width 640 --height 480 --fps 15 --fourcc NV12 \
    --preprocess-backend auto --rknn-parallel-contexts 3 \
    --parallel-hold-v4l2-dmabuf --npu-core 0 \
    --rtsp-output-enable --save-frames --save-dir /dev/shm/eldercare_frames

# main(): runs once at startup
cfg      = parse_camera_app_config(argc, argv)
pose_udp = PoseUdpSender(127.0.0.1:5800)      # to fall_service
rtsp_out = RtspOutputServer(:8554/eldercare)  # to family viewers
rknn_init(ctx, yolov8n-pose.rknn)             # load the model
rknn_set_core_mask(ctx, NPU core 0)
</script>

<script type="text/plain" data-src id="src-v4l2open" data-lang="cpp" data-file="src/cpp_edge/camera_v4l2.cpp">
// V4L2MMapCamera::open(): configure_format -> init_mmap -> start_stream
set_format(VIDIOC_S_FMT, 640x480)
if (pixel_format != V4L2_PIX_FMT_NV12) return false;   // driver MUST output NV12

request_buffers(VIDIOC_REQBUFS, count = 8, MMAP)        // deep enough for 3 in-flight frames
for (i = 0; i < 8; ++i) {
    query(VIDIOC_QUERYBUF, i)                           // offset / length / planes
    mmap(buffer[i])                                     // CPU-visible view
    fd[i] = export(VIDIOC_EXPBUF, i)                    // DMA-BUF fd, RGA reads it directly
    queue(VIDIOC_QBUF, i)                               // give the empty buffer to the driver
}
stream_on(VIDIOC_STREAMON)                              // camera/ISP starts filling buffers
</script>

<script type="text/plain" data-src id="src-lifecycle" data-lang="cpp" data-file="src/cpp_edge/camera_v4l2.cpp + main loop">
// One capture-loop iteration. A buffer is only safe to touch between DQBUF and QBUF.
poll(camera_fd, 1000)                       // wait until a frame is ready
k = dequeue(VIDIOC_DQBUF)                    // driver: "buffer k is filled, it is yours"

frame  = Mat_view(mmap[k])                   // a VIEW over the mmap buffer, not a copy
dmabuf = fd[k]                               // the same buffer, as a DMA-BUF fd

// RGA -> RKNN -> tracking -> pose UDP -> RTSP push all read this buffer here

queue(VIDIOC_QBUF, k)                        // return it; the camera may overwrite it now
// keeping frame/dmabuf past QBUF causes tearing (top = old frame, bottom = new)
</script>

<script type="text/plain" data-src id="src-rga" data-lang="cpp" data-file="src/cpp_edge/camera_preprocess_rga_zero_copy.cpp">
// auto backend = the DEPLOYED path. Model wants 640 RGB; the camera gives NV12.
// RGA does the convert on hardware instead of CPU OpenCV.
rga_convert(src_fd = v4l2_dmabuf,            // camera NV12 buffer, read by fd (no CPU copy)
            NV12 -> RGB, resize, letterbox)  // ~1.3 ms on the RGA 2D engine
rknn_inputs_set(ctx, rgb)                    // hands the input to the NPU (~11 ms / frame)
rknn_run(ctx)

// The full zero-copy path is NOT used here:
//   rga_resize_fd_to_fd(...) -> rknn_set_io_mem(...)   // bind RGA output straight to the NPU
// On the 640 model it measured ~210 ms per inference, and it is disabled across the 3
// parallel workers (a shared io-mem binding is unsafe with several frames in flight).
</script>

<script type="text/plain" data-src id="src-parallel" data-lang="cpp" data-file="src/cpp_edge/main_yolo_pose_rknn_camera.cpp">
// One worker per NPU core, each owning its own RKNN context.
spawn N workers (N = context_count), pin each to an NPU core:
  worker(core):
    ctx = rknn_context_for(core)
    loop:
      job = job_queue.pop()                       // blocks until a frame arrives
      out = run_rknn_frame(ctx, job.nv12_dmabuf)  // RGA NV12->RGB, infer, decode
      results[job.frame_id] = out                 // keyed for in-order reassembly
// the capture thread (A55) feeds the queue; results drain back in frame order
</script>

<script type="text/plain" data-src id="src-postprocess" data-lang="cpp" data-file="src/cpp_edge/yolo_pose_postprocess.cpp">
// Letterbox-aware decode + NMS, isolated from RKNN/camera so it unit-tests alone.
restore_x(x, lb, orig_w):                  // undo letterbox padding, clamp to frame
    return clamp((x - lb.pad_x) / lb.scale, 0, orig_w - 1)

iou(a, b):                                 // standard intersection-over-union
    return overlap_area(a, b) / (area(a) + area(b) - overlap_area(a, b))

// pipeline: decode anchors -> restore coords -> NMS(iou) -> assign track id
</script>

<script type="text/plain" data-src id="src-outputs" data-lang="cpp" data-file="src/cpp_edge/pose_udp_sender.cpp + rtsp_output_server.cpp">
// Output 1: pose over localhost UDP, for fall_service. Datagram shape:
//   { ts, frame_id, w, h, persons:[ { track_id, conf, bbox:[x1,y1,x2,y2], kpts:[[x,y,c] x17] } ] }
send_udp(pose_json, NON_BLOCKING)    // fire-and-forget; a dropped frame is fine,
                                     // the fall state machine integrates over seconds

// Output 2: RTSP, served by THIS process (no second owner of /dev/video12)
appsrc(NV12) -> queue(leaky=downstream) -> mpph264enc -> h264parse -> rtph264pay
rtsp.push_nv12(frame)                // copies into a GStreamer buffer, then returns,
                                     // so QBUF after it returns is safe
</script>

<script type="text/plain" data-src id="src-features" data-lang="cpp" data-file="src/cpp_runtime/fall_detector.cpp">
// Posture from joints, all normalized by frame size (resolution-independent).
body_angle    = atan2(|hip.x - shoulder.x|, |hip.y - shoulder.y|)   // 0=upright 90=flat
bbox_ratio    = bbox_h / bbox_w                                     // < 1 = lying flat
down_velocity = max(d_center_y, d_hip_y) / dt   // skipped if dt looks like an NTP jump

angle_score   = ramp(body_angle, 25 deg  -> 65 deg)
flat_score    = ramp(bbox_ratio, 1.65 -> 0.90)
lying_score   = max(angle_score, flat_score)
</script>

<script type="text/plain" data-src id="src-states" data-lang="cpp" data-file="src/cpp_runtime/fall_detector.cpp">
// Temporal state machine (thresholds shown inline).
NORMAL:
    if lying_now                              -> LYING
    elif fall_score >= 0.42 or sudden_drop    -> WARNING
WARNING:
    if lying_now                              -> LYING
    elif fall_score >= 0.62 and sudden, held >= 0.8 s -> FALL_CONFIRMED
    elif fall_score < 0.30                    -> NORMAL
LYING:
    if floor_level and entry_evidence and lying_ratio >= 0.45, held >= 1.8 s -> FALL_CONFIRMED
    elif not lying for 1 s                    -> NORMAL
FALL_CONFIRMED:                               // latches through brief pose loss
    if low score and not lying, held >= 2 s   -> NORMAL
</script>

<script type="text/plain" data-src id="src-scoring" data-lang="cpp" data-file="src/cpp_runtime/fall_detector.cpp">
// Window-level evidence: one bad frame can never fire an alarm.
fall_score = clamp(
      0.35 * lying_frame_ratio     // most of the window is flat
    + 0.25 * lying_score_mean      // and convincingly so
    + 0.20 * max_down_score        // with a real downward motion
    + 0.10 * center_drop_score     // body lowered across the window
    + 0.10 * angle_change_score    // tilted toward horizontal
    - conf_penalty )               // discount low-confidence poses
</script>

<script type="text/plain" data-src id="src-mqtt" data-lang="cpp" data-file="src/cpp_runtime/fall_service.cpp">
// Publish each state transition exactly once over the local MQTT bus.
publish(topic, payload, retain):
    shell: mosquitto_pub -t topic -m payload [-r]   // board lacks libmosquitto headers

on state change (per tracked person):
    if new_state == FALL_CONFIRMED:
        publish("eldercare/fall/event", { FALL_CONFIRMED, score, reason, ts })
        record_snapshot_async(ts)                   // freeze evidence from the JPEG ring
    elif old_state == FALL_CONFIRMED:
        publish("eldercare/fall/event", { RECOVERED, ... })
</script>

<script type="text/plain" data-src id="src-push" data-lang="cpp" data-file="src/cpp_runtime/alert_service.cpp">
// Notify family via ntfy (plain HTTP over curl, no extra deps on the board).
send(title, body, priority, tags):
    curl -H "Title: ..." -H "Priority: ..." -H "Tags: ..." --data-binary body  <ntfy_url>
    // priority = high when level == sos, so it can reach a silenced phone

send_file(title, snapshot, priority):
    if not exists(snapshot): return false           // snapshot is best-effort:
    curl -X PUT --data-binary @snapshot  <ntfy_url>  // a failed attachment must NOT
                                                    // turn an already-sent alert into a failure
</script>

<script type="text/plain" data-src id="src-aec" data-lang="cpp" data-file="src/audio/audio_aec_duplex.cpp">
// Double-talk gate: real near-end speech (interruption) vs the speaker's own echo.
detect_double_talk(residual, predicted_echo, env, bands):
    if nothing_playing(env): return false           // no echo, no gate needed
    residual_excess         = residual > predicted_echo + margin  and  residual > 2.2*noise
    multi_band_decorrelated = bands.weak >= 2  or  bands.corr_avg < 0.34
    return residual_excess AND multi_band_decorrelated   // both required on this board
// energy alone is fooled by nonlinear residual; correlation alone by weak echo
</script>

<script type="text/plain" data-src id="src-chain" data-lang="cpp" data-file="src/cpp_runtime/voice_service.cpp">
// Offline turn loop after wake. Every stage runs on the device.
if woke: speak("我在。")                       // local neural TTS
loop while session is active:
    audio = capture_vad()                       // Silero VAD endpoints the utterance
    text  = sensevoice_asr(audio)               // offline Chinese -> text
    reply = qwen_llm(text, history)             // llama-server, multi-turn context
    speak(matcha_tts(reply))                    // playback also feeds the AEC reference
// a rolling 15 s window of our own speech rejects late echo instead of repeating it
</script>

<script type="text/plain" data-src id="src-fallans" data-lang="cpp" data-file="src/cpp_runtime/voice_service.cpp">
// Post-fall check-in: a short prompt that allows interruption, then classify.
speak_nowait("您可能摔倒了，您还好吗？")          // non-blocking, so the person can interrupt
text  = asr(capture_vad())                       // reply, mixed with the prompt's echo
level = classify_fall_reply(text)                // ok / sos / unclear

classify_fall_reply(text):
    if any(distress_marker in text):  return "sos"   // 救命 / 起不来 / 疼 / 头晕 ...
    if any(elder_ok_marker  in text): return "ok"    // 我还好 / 我没事 / 能起来 ...
    return "unclear"                                  // silence/echo-only -> caller defaults to SOS
// match only markers the prompt itself cannot contain (do not subtract the prompt)
</script>

<script type="text/plain" data-src id="src-fan" data-lang="sh" data-file="board_src/eldercare-fan-hold.sh">
#!/bin/sh
# Hold the pwm-fan at a quiet speed so the on-board mic stays usable.
# At the stock pwm=100 the fan's broadband noise sits in the 300-3400 Hz speech
# band and raised the mic noise floor about 10x (rms 0.0028 -> 0.028), so a fall
# reply transcribed as empty and the check-in escalated to SOS. Firmware re-asserts
# pwm=100 about every 10 s, so we rewrite a low value every second.
LOW=50
loop every 1 s:
    t = read(soc_thermal)
    if t >= 72 C: hot = 1          # stop forcing low if the SoC warms up
    if t <  66 C: hot = 0          # hysteresis; cpufreq throttling stays active
    if not hot:   write(pwm1, LOW)
</script>

/* ---------- state & helpers ---------- */
const state = { lang: (localStorage.getItem("eldercare_lang") || (new URLSearchParams(location.search).get("lang")) || "en") };
if(state.lang!=="en" && state.lang!=="zh") state.lang="en";

const L = () => state.lang;
const tr = (o) => o==null ? "" : (typeof o==="string" ? o : (o[L()] || o.en || ""));
const esc = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function setLang(l){ state.lang=l; localStorage.setItem("eldercare_lang",l); render(); }
function go(route){ location.hash = route ? "#/"+route : "#/"; }

/* split a raw line into [code, comment] without breaking on quotes */
function splitComment(line, lang){
  const hash = (lang!=="cpp");
  let q=null;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(q){ if(c===q && line[i-1]!=="\\") q=null; continue; }
    if(c==='"'||c==="'"){ q=c; continue; }
    if(!hash && c==="/" && line[i+1]==="/") return [line.slice(0,i), line.slice(i)];
    if(hash && c==="#") return [line.slice(0,i), line.slice(i)];
  }
  return [line,""];
}

function codeBlock(id){
  const el=document.getElementById("src-"+id);
  if(!el) return "";
  const lang=el.dataset.lang||"cpp", file=el.dataset.file||"";
  let raw=el.textContent.replace(/^\n+/,"").replace(/\s+$/,"");
  const lines=raw.split("\n").map(ln=>{
    const [code,comment]=splitComment(ln,lang);
    const html=esc(code)+(comment?'<span class="cmt">'+esc(comment)+"</span>":"");
    return '<span class="cl">'+(html.length?html:"&nbsp;")+"</span>";
  }).join("");
  return '<div class="code"><div class="cfile"><span>'+esc(file)+'</span><span class="lang">'+tr(T.pseudo)+'</span></div><pre><code>'+lines+"</code></pre></div>";
}

/* generic vertical flow chart */
function flowSvg(steps, color){
  const W=560, bh=58, gap=42, pad=4;
  const H=steps.length*bh+(steps.length-1)*gap+pad*2;
  const cx=W/2;
  let y=pad, out=['<svg viewBox="0 0 '+W+' '+H+'" class="flow" preserveAspectRatio="xMidYMin meet">'];
  steps.forEach((s,i)=>{
    if(i>0){
      const ya=y-gap, yb=y;
      out.push('<line class="fln" x1="'+cx+'" y1="'+(ya+3)+'" x2="'+cx+'" y2="'+(yb-9)+'" marker-end="url(#fa)"/>');
      if(s.edge) out.push('<text class="fedge" x="'+(cx+12)+'" y="'+((ya+yb)/2+3)+'">'+esc(tr(s.edge))+"</text>");
    }
    out.push('<g><rect class="fbox" x="2" y="'+y+'" width="'+(W-4)+'" height="'+bh+'" style="stroke:var(--'+color+')"/>');
    out.push('<text class="ft" x="18" y="'+(y+24)+'">'+esc(s.t)+"</text>");
    out.push('<text class="fd" x="18" y="'+(y+44)+'">'+esc(tr(s.d))+"</text></g>");
    y+=bh+gap;
  });
  out.push("</svg>");
  return out.join("");
}

/* custom state-machine diagram for fall detection */
function stateMachineSvg(){
  const C={normal:"#22c55e",warn:"var(--fall)",lying:"#fb923c",fall:"var(--alert)"};
  const box=(x,y,w,c,t,s)=>'<rect class="stbox" x="'+x+'" y="'+y+'" width="'+w+'" height="52" rx="10" fill="rgba(255,255,255,.03)" stroke="'+c+'"/>'+
    '<text class="stt" x="'+(x+w/2)+'" y="'+(y+23)+'" text-anchor="middle">'+t+"</text>"+
    '<text class="sts" x="'+(x+w/2)+'" y="'+(y+40)+'" text-anchor="middle">'+esc(tr(s))+"</text>";
  const arr=(x1,y1,x2,y2,dash)=>'<line class="'+(dash?"fdash":"fln")+'" x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" marker-end="url(#fa)"/>';
  const lbl=(x,y,t,anc)=>'<text class="fedge" x="'+x+'" y="'+y+'" text-anchor="'+(anc||"start")+'">'+esc(tr(t))+"</text>";
  let p=['<svg viewBox="0 0 560 420" class="flow" preserveAspectRatio="xMidYMin meet">'];
  p.push(box(170,10,220,C.normal,"NORMAL",{en:"standing / moving",zh:"站立 / 活动"}));
  p.push(box(170,130,220,C.warn,"WARNING",{en:"score >= 0.42 or sudden drop",zh:"分数 >= 0.42 或骤降"}));
  p.push(box(170,250,220,C.lying,"LYING",{en:"flat posture detected",zh:"检测到扁平姿态"}));
  p.push(box(150,360,260,C.fall,"FALL_CONFIRMED",{en:"alert = true (latched)",zh:"alert = true(锁存)"}));
  p.push(arr(280,62,280,128));  p.push(lbl(292,98,{en:"rising fall_score",zh:"fall_score 升高"}));
  p.push(arr(280,182,280,248)); p.push(lbl(292,218,{en:"lying pose",zh:"躺姿"}));
  p.push(arr(280,302,280,358)); p.push(lbl(292,335,{en:"floor + evidence >= 1.8 s",zh:"贴地 + 证据 >= 1.8 s"}));
  p.push('<path class="fln" d="M170,40 C70,70 70,250 168,266" marker-end="url(#fa)" fill="none"/>');
  p.push(lbl(40,160,{en:"sudden",zh:"骤然"})); p.push(lbl(40,178,{en:"collapse",zh:"倒地"}));
  p.push('<path class="fdash" d="M410,386 C510,330 510,90 392,40" marker-end="url(#fa)" fill="none"/>');
  p.push(lbl(520,210,{en:"recover",zh:"恢复"},"middle")); p.push(lbl(520,228,{en:"2 s",zh:"2 秒"},"middle"));
  p.push("</svg>");
  return p.join("");
}

function dataFlow(df){
  const col=(title,arr,mid)=>{
    let h='<div class="dfcol'+(mid?" mid":"")+'"><h5>'+title+"</h5>";
    arr.forEach(x=>{ h+='<span class="pill k">'+esc(x)+"</span>"; });
    return h+"</div>";
  };
  return '<div class="df">'+col(tr(T.din),df.in)+'<div class="dfarr">-></div>'+col(tr(T.dproc),df.proc,true)+'<div class="dfarr">-></div>'+col(tr(T.dout),df.out)+"</div>";
}

function demoBlock(d, color){
  const shots=d.shots.map(function(s){
    return '<figure class="shot"><img src="'+s.img+'" alt="'+esc(tr(s.cap))+'"><figcaption>'+esc(tr(s.cap))+"</figcaption></figure>";
  }).join("");
  return '<div class="demo" style="--bd:var(--'+color+')"><div class="ptitle"><span class="dot"></span>'+esc(tr(d.title))+"</div>"+
         '<p class="sub" style="margin:-4px 0 0">'+esc(tr(d.note))+"</p>"+
         '<div class="shots">'+shots+"</div></div>";
}

function panel(titleKey, color, inner){
  return '<div class="panel" style="--bd:var(--'+color+')"><div class="ptitle"><span class="dot"></span>'+tr(T[titleKey])+"</div>"+inner+"</div>";
}

function moduleView(m){
  const cards=m.subs.map(s=>(
    '<a class="scard" href="#/'+m.id+"/"+s.id+'" style="--bd:var(--'+m.color+')">'+
      '<div class="k">'+tr(T.subs)+"</div>"+
      "<h4>"+esc(tr(s.name))+"</h4>"+
      "<p>"+esc(tr(s.summary))+"</p>"+
    "</a>"
  )).join("");
  return ''+
    '<div class="crumb"><a href="#/">'+tr(T.home)+'</a><span>›</span>'+esc(tr(m.name))+"</div>"+
    "<section style='padding-top:14px'>"+
      '<div class="mhead" style="--bd:var(--'+m.color+')">'+
        "<h1>"+esc(tr(m.name))+"</h1>"+
        '<div class="nm2">'+esc(tr(m.name2))+"</div>"+
        '<p class="tag">'+esc(tr(m.overview))+"</p>"+
        '<div class="srcpill">'+tr(T.source)+": "+esc(m.file)+"</div>"+
      "</div>"+
      (m.demo ? demoBlock(m.demo, m.color) : "")+
      '<div class="secttl" style="margin-top:22px"><h2>'+tr(T.subs)+"</h2></div>"+
      '<p class="sub">'+tr(T.subs_sub)+"</p>"+
      '<div class="grid g3">'+cards+"</div>"+
    "</section>";
}

function subView(m,s){
  const idx=m.subs.findIndex(x=>x.id===s.id);
  const prev=m.subs[idx-1], next=m.subs[idx+1];
  const flow = s.customFlow==="states" ? stateMachineSvg() : (s.flow ? flowSvg(s.flow,m.color) : "");
  let nav='<div class="subnav">';
  nav+= prev ? '<a href="#/'+m.id+"/"+prev.id+'">← '+esc(tr(prev.name))+"</a>" : '<a href="#/'+m.id+'">↑ '+esc(tr(m.name))+"</a>";
  nav+= next ? '<a href="#/'+m.id+"/"+next.id+'">'+esc(tr(next.name))+" →</a>" : '<a href="#/'+m.id+'">'+tr(T.subs)+" ↑</a>";
  nav+="</div>";
  return ''+
    '<div class="crumb"><a href="#/">'+tr(T.home)+'</a><span>›</span><a href="#/'+m.id+'">'+esc(tr(m.name))+'</a><span>›</span>'+esc(tr(s.name))+"</div>"+
    "<section style='padding-top:14px'>"+
      '<div class="mhead" style="--bd:var(--'+m.color+')">'+
        "<h1>"+esc(tr(s.name))+"</h1>"+
        '<p class="tag">'+esc(tr(s.summary))+"</p>"+
      "</div>"+
      (flow?panel("flow",m.color,flow):"")+
      (s.df?panel("data",m.color,dataFlow(s.df)):"")+
      panel("impl",m.color,codeBlock(s.code))+
      panel("why",m.color,'<p class="why">'+esc(tr(s.why))+"</p>")+
      nav+
    "</section>";
}

/* ---------- router ---------- */
function render(){
  document.documentElement.lang = L()==="zh" ? "zh-CN" : "en";
  document.getElementById("lang-en").classList.toggle("on",L()==="en");
  document.getElementById("lang-zh").classList.toggle("on",L()==="zh");
  document.getElementById("foot").textContent = tr(T.foot);
  var bs=document.getElementById("brandsub"); if(bs) bs.textContent = tr(T.brand_sub);

  const parts=location.hash.replace(/^#\/?/,"").split("/").filter(Boolean);
  const app=document.getElementById("app");
  if(parts.length===0){ app.innerHTML=home(); window.scrollTo(0,0); return; }
  const m=DATA.find(x=>x.id===parts[0]);
  if(!m){ app.innerHTML=home(); return; }
  if(parts.length===1){ app.innerHTML=moduleView(m); window.scrollTo(0,0); return; }
  const s=m.subs.find(x=>x.id===parts[1]);
  if(!s){ app.innerHTML=moduleView(m); window.scrollTo(0,0); return; }
  app.innerHTML=subView(m,s); window.scrollTo(0,0);
}

window.addEventListener("hashchange",render);
render();
</script>
