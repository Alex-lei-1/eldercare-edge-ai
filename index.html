<!-- =============== IMPLEMENTATION SKETCHES (annotated pseudocode; full source is in a private repo) =============== -->
<script type="text/plain" data-src id="src-boot" data-lang="sh" data-file="systemd/eldercare-vision.service + run_pose_camera.sh + main()">
# systemd unit: pin to the A76 cores, enable RTSP, run the launcher
[Service]
CPUAffinity=4 5 6 7
Environment=RTSP_OUTPUT_ENABLE=1
ExecStart=.../run_pose_camera.sh

# run_pose_camera.sh: ONE process owns the camera and the whole AI path
taskset -c 4-7 main_yolo_pose_rknn_camera \
    --model yolov8n-pose.rknn --camera-device /dev/video12 \
    --width 640 --height 480 --fps 15 --fourcc NV12 \
    --preprocess-backend auto --rknn-parallel-contexts 3 \
    --parallel-hold-v4l2-dmabuf --npu-core 0 \
    --rtsp-output-enable --save-frames --save-dir /dev/shm/eldercare_frames

# main(): runs once at startup
cfg      = parse_camera_app_config(argc, argv)
pose_udp = PoseUdpSender(127.0.0.1:5800)      # to fall_service
rtsp_out = RtspOutputServer(:8554/eldercare)  # to family viewers
rknn_init(ctx, yolov8n-pose.rknn)             # load the model
rknn_set_core_mask(ctx, NPU core 0)
</script>

<script type="text/plain" data-src id="src-v4l2open" data-lang="cpp" data-file="src/cpp_edge/camera_v4l2.cpp">
// V4L2MMapCamera::open(): configure_format -> init_mmap -> start_stream
set_format(VIDIOC_S_FMT, 640x480)
if (pixel_format != V4L2_PIX_FMT_NV12) return false;   // driver MUST output NV12

request_buffers(VIDIOC_REQBUFS, count = 8, MMAP)        // deep enough for 3 in-flight frames
for (i = 0; i < 8; ++i) {
    query(VIDIOC_QUERYBUF, i)                           // offset / length / planes
    mmap(buffer[i])                                     // CPU-visible view
    fd[i] = export(VIDIOC_EXPBUF, i)                    // DMA-BUF fd, RGA reads it directly
    queue(VIDIOC_QBUF, i)                               // give the empty buffer to the driver
}
stream_on(VIDIOC_STREAMON)                              // camera/ISP starts filling buffers
</script>

<script type="text/plain" data-src id="src-lifecycle" data-lang="cpp" data-file="src/cpp_edge/camera_v4l2.cpp + main loop">
// One capture-loop iteration. A buffer is only safe to touch between DQBUF and QBUF.
poll(camera_fd, 1000)                       // wait until a frame is ready
k = dequeue(VIDIOC_DQBUF)                    // driver: "buffer k is filled, it is yours"

frame  = Mat_view(mmap[k])                   // a VIEW over the mmap buffer, not a copy
dmabuf = fd[k]                               // the same buffer, as a DMA-BUF fd

// RGA -> RKNN -> tracking -> pose UDP -> RTSP push all read this buffer here

queue(VIDIOC_QBUF, k)                        // return it; the camera may overwrite it now
// keeping frame/dmabuf past QBUF causes tearing (top = old frame, bottom = new)
</script>

<script type="text/plain" data-src id="src-rga" data-lang="cpp" data-file="src/cpp_edge/camera_preprocess_rga_zero_copy.cpp">
// auto backend = the DEPLOYED path. Model wants 640 RGB; the camera gives NV12.
// RGA does the convert on hardware instead of CPU OpenCV.
rga_convert(src_fd = v4l2_dmabuf,            // camera NV12 buffer, read by fd (no CPU copy)
            NV12 -> RGB, resize, letterbox)  // ~1.3 ms on the RGA 2D engine
rknn_inputs_set(ctx, rgb)                    // hands the input to the NPU (~11 ms / frame)
rknn_run(ctx)

// The full zero-copy path is NOT used here:
//   rga_resize_fd_to_fd(...) -> rknn_set_io_mem(...)   // bind RGA output straight to the NPU
// On the 640 model it measured ~210 ms per inference, and it is disabled across the 3
// parallel workers (a shared io-mem binding is unsafe with several frames in flight).
</script>

<script type="text/plain" data-src id="src-parallel" data-lang="cpp" data-file="src/cpp_edge/main_yolo_pose_rknn_camera.cpp">
// One worker per NPU core, each owning its own RKNN context.
spawn N workers (N = context_count), pin each to an NPU core:
  worker(core):
    ctx = rknn_context_for(core)
    loop:
      job = job_queue.pop()                       // blocks until a frame arrives
      out = run_rknn_frame(ctx, job.nv12_dmabuf)  // RGA NV12->RGB, infer, decode
      results[job.frame_id] = out                 // keyed for in-order reassembly
// the capture thread (A55) feeds the queue; results drain back in frame order
</script>

<script type="text/plain" data-src id="src-postprocess" data-lang="cpp" data-file="src/cpp_edge/yolo_pose_postprocess.cpp">
// Letterbox-aware decode + NMS, isolated from RKNN/camera so it unit-tests alone.
restore_x(x, lb, orig_w):                  // undo letterbox padding, clamp to frame
    return clamp((x - lb.pad_x) / lb.scale, 0, orig_w - 1)

iou(a, b):                                 // standard intersection-over-union
    return overlap_area(a, b) / (area(a) + area(b) - overlap_area(a, b))

// pipeline: decode anchors -> restore coords -> NMS(iou) -> assign track id
</script>

<script type="text/plain" data-src id="src-outputs" data-lang="cpp" data-file="src/cpp_edge/pose_udp_sender.cpp + rtsp_output_server.cpp">
// Output 1: pose over localhost UDP, for fall_service. Datagram shape:
//   { ts, frame_id, w, h, persons:[ { track_id, conf, bbox:[x1,y1,x2,y2], kpts:[[x,y,c] x17] } ] }
send_udp(pose_json, NON_BLOCKING)    // fire-and-forget; a dropped frame is fine,
                                     // the fall state machine integrates over seconds

// Output 2: RTSP, served by THIS process (no second owner of /dev/video12)
appsrc(NV12) -> queue(leaky=downstream) -> mpph264enc -> h264parse -> rtph264pay
rtsp.push_nv12(frame)                // copies into a GStreamer buffer, then returns,
                                     // so QBUF after it returns is safe
</script>

<script type="text/plain" data-src id="src-features" data-lang="cpp" data-file="src/cpp_runtime/fall_detector.cpp">
// Posture from joints, all normalized by frame size (resolution-independent).
body_angle    = atan2(|hip.x - shoulder.x|, |hip.y - shoulder.y|)   // 0=upright 90=flat
bbox_ratio    = bbox_h / bbox_w                                     // < 1 = lying flat
down_velocity = max(d_center_y, d_hip_y) / dt   // skipped if dt looks like an NTP jump

angle_score   = ramp(body_angle, 25 deg  -> 65 deg)
flat_score    = ramp(bbox_ratio, 1.65 -> 0.90)
lying_score   = max(angle_score, flat_score)
</script>

<script type="text/plain" data-src id="src-states" data-lang="cpp" data-file="src/cpp_runtime/fall_detector.cpp">
// Temporal state machine (thresholds shown inline).
NORMAL:
    if lying_now                              -> LYING
    elif fall_score >= 0.42 or sudden_drop    -> WARNING
WARNING:
    if lying_now                              -> LYING
    elif fall_score >= 0.62 and sudden, held >= 0.8 s -> FALL_CONFIRMED
    elif fall_score < 0.30                    -> NORMAL
LYING:
    if floor_level and entry_evidence and lying_ratio >= 0.45, held >= 1.8 s -> FALL_CONFIRMED
    elif not lying for 1 s                    -> NORMAL
FALL_CONFIRMED:                               // latches through brief pose loss
    if low score and not lying, held >= 2 s   -> NORMAL
</script>

<script type="text/plain" data-src id="src-scoring" data-lang="cpp" data-file="src/cpp_runtime/fall_detector.cpp">
// Window-level evidence: one bad frame can never fire an alarm.
fall_score = clamp(
      0.35 * lying_frame_ratio     // most of the window is flat
    + 0.25 * lying_score_mean      // and convincingly so
    + 0.20 * max_down_score        // with a real downward motion
    + 0.10 * center_drop_score     // body lowered across the window
    + 0.10 * angle_change_score    // tilted toward horizontal
    - conf_penalty )               // discount low-confidence poses
</script>

<script type="text/plain" data-src id="src-mqtt" data-lang="cpp" data-file="src/cpp_runtime/fall_service.cpp">
// Publish each state transition exactly once over the local MQTT bus.
publish(topic, payload, retain):
    shell: mosquitto_pub -t topic -m payload [-r]   // board lacks libmosquitto headers

on state change (per tracked person):
    if new_state == FALL_CONFIRMED:
        publish("eldercare/fall/event", { FALL_CONFIRMED, score, reason, ts })
        record_snapshot_async(ts)                   // freeze evidence from the JPEG ring
    elif old_state == FALL_CONFIRMED:
        publish("eldercare/fall/event", { RECOVERED, ... })
</script>

<script type="text/plain" data-src id="src-push" data-lang="cpp" data-file="src/cpp_runtime/alert_service.cpp">
// Notify family via ntfy (plain HTTP over curl, no extra deps on the board).
send(title, body, priority, tags):
    curl -H "Title: ..." -H "Priority: ..." -H "Tags: ..." --data-binary body  <ntfy_url>
    // priority = high when level == sos, so it can reach a silenced phone

send_file(title, snapshot, priority):
    if not exists(snapshot): return false           // snapshot is best-effort:
    curl -X PUT --data-binary @snapshot  <ntfy_url>  // a failed attachment must NOT
                                                    // turn an already-sent alert into a failure
</script>

<script type="text/plain" data-src id="src-aec" data-lang="cpp" data-file="src/audio/audio_aec_duplex.cpp">
// Double-talk gate: real near-end speech (interruption) vs the speaker's own echo.
detect_double_talk(residual, predicted_echo, env, bands):
    if nothing_playing(env): return false           // no echo, no gate needed
    residual_excess         = residual > predicted_echo + margin  and  residual > 2.2*noise
    multi_band_decorrelated = bands.weak >= 2  or  bands.corr_avg < 0.34
    return residual_excess AND multi_band_decorrelated   // both required on this board
// energy alone is fooled by nonlinear residual; correlation alone by weak echo
</script>

<script type="text/plain" data-src id="src-chain" data-lang="cpp" data-file="src/cpp_runtime/voice_service.cpp">
// Offline turn loop after wake. Every stage runs on the device.
if woke: speak("我在。")                       // local neural TTS
loop while session is active:
    audio = capture_vad()                       // Silero VAD endpoints the utterance
    text  = sensevoice_asr(audio)               // offline Chinese -> text
    reply = qwen_llm(text, history)             // llama-server, multi-turn context
    speak(matcha_tts(reply))                    // playback also feeds the AEC reference
// a rolling 15 s window of our own speech rejects late echo instead of repeating it
</script>

<script type="text/plain" data-src id="src-fallans" data-lang="cpp" data-file="src/cpp_runtime/voice_service.cpp">
// Post-fall check-in: a short prompt that allows interruption, then classify.
speak_nowait("您可能摔倒了，您还好吗？")          // non-blocking, so the person can interrupt
text  = asr(capture_vad())                       // reply, mixed with the prompt's echo
level = classify_fall_reply(text)                // ok / sos / unclear

classify_fall_reply(text):
    if any(distress_marker in text):  return "sos"   // 救命 / 起不来 / 疼 / 头晕 ...
    if any(elder_ok_marker  in text): return "ok"    // 我还好 / 我没事 / 能起来 ...
    return "unclear"                                  // silence/echo-only -> caller defaults to SOS
// match only markers the prompt itself cannot contain (do not subtract the prompt)
</script>

<script type="text/plain" data-src id="src-fan" data-lang="sh" data-file="board_src/eldercare-fan-hold.sh">
#!/bin/sh
# Hold the pwm-fan at a quiet speed so the on-board mic stays usable.
# At the stock pwm=100 the fan's broadband noise sits in the 300-3400 Hz speech
# band and raised the mic noise floor about 10x (rms 0.0028 -> 0.028), so a fall
# reply transcribed as empty and the check-in escalated to SOS. Firmware re-asserts
# pwm=100 about every 10 s, so we rewrite a low value every second.
LOW=50
loop every 1 s:
    t = read(soc_thermal)
    if t >= 72 C: hot = 1          # stop forcing low if the SoC warms up
    if t <  66 C: hot = 0          # hysteresis; cpufreq throttling stays active
    if not hot:   write(pwm1, LOW)
</script>

      why:{en:"The point of V4L2 here is not just getting an image, it is getting the underlying buffer plus a DMA-BUF fd. The device is opened single-plane first: in NV12 the Y and UV sit in one buffer, so a single DMA-BUF fd is the whole frame, which is what makes a true fd-to-fd path possible; if the device only offers VIDEO_CAPTURE_MPLANE the code falls back to multi-plane (Y and UV as separate planes). The pool is 8 deep because 3 parallel RKNN contexts may hold several DQBUF'd frames at once; too few buffers and the driver has nowhere to write the next frame and stalls. The driver allocates them, not malloc or OpenCV. (The flicker when someone approached was fixed one layer up, in the ISP IQ tuning.)",
           zh:"这里用 V4L2 的意义不只是拿一张图,而是拿到底层 buffer 加一个 DMA-BUF fd。设备优先以 single-plane 打开:NV12 下 Y 和 UV 在同一块 buffer 里,所以一个 DMA-BUF fd 就是一整帧,这正是能走真正 fd-to-fd 路径的前提;如果设备只给 VIDEO_CAPTURE_MPLANE,代码就回退到多平面(Y、UV 分成两个面)。池子做到 8 个,是因为 3 个并行 RKNN 上下文可能同时 hold 住好几帧;buffer 太少,驱动就没地方写下一帧,会卡住。buffer 是驱动分配的,不是 malloc 也不是 OpenCV。(有人靠近时画面闪那个问题,是在上游的 ISP IQ 调校里修掉的。)"} },

      why:{en:"A cv::Mat is usually just a view over the mmap buffer; it does not own the pixels. QBUF early while still using the view and the camera starts writing the next frame into the same memory, which gives tearing (top half old frame, bottom half new). RTSP is safe here because push_nv12 copies into a GStreamer buffer before returning, so QBUF after it returns is fine.",

{
  id:"judgment", color:"fall",
  name:{en:"Fall detection",zh:"跌倒检测"}, name2:{en:"temporal state machine",zh:"时序状态机"},

  file:"src/cpp_runtime/fall_detector.cpp",
  overview:{en:"Keypoints arrive over UDP. A state machine integrates body angle, box flatness, floor height and downward velocity over a 2.5-second window. It does not fire on a single frame: a fall requires a downward motion followed by sustained flat posture near the floor.",
            zh:"关键点通过 UDP 传进来。状态机在 2.5 秒的窗口里,把身体角度、框的扁平程度、离地高度和下落速度放在一起看。它不会凭某一帧就报警:得先有一个下落动作,再接着出现持续的、贴着地面的扁平姿态,才算摔倒。"},
  subs:[
    { id:"features", code:"features",
      name:{en:"Feature extraction",zh:"特征提取"},
      summary:{en:"Per-frame body angle, box flatness, vertical center and downward velocity, normalized.",zh:"逐帧算出身体角度、框扁平度、竖直中心和下落速度,并统一做归一化。"},
      flow:[

      why:{en:"Every value is divided by frame size, so changing the camera from 384 to 640 does not require retuning thresholds. center_y is the vertical body center: the closer to the bottom of the frame, the closer the person is to the floor, which separates a real fall from sitting or bending. Low-confidence keypoints are down-weighted rather than trusted blindly. Velocity is guarded against NTP clock jumps: when the wall clock corrects, the frame's posture is kept but its velocity is discarded.",
           zh:"所有量都按画面尺寸做了归一化,所以相机从 384 换成 640,阈值一个都不用改。center_y 是人体竖直中心:越靠近画面底部,人离地面越近,这能把真摔倒和坐下、弯腰区分开。关键点置信度低时会被降权,而不是盲目采信。速度还专门防了 NTP 校时跳变:系统时钟被校正的那一帧,姿态照常保留,只把算出来的速度丢掉。"} },

      df:{in:["fall_score","lying_score","floor_level","entry evidence"], proc:["state transitions","sustained timers","latch + recovery"], out:["state","alert = (state == FALL_CONFIRMED)"]},
      why:{en:"Confirmation requires lying posture, a floor-level center, and entry evidence (a real drop or a prior WARNING) sustained for at least 1.8 s. FALL_CONFIRMED then latches through brief pose loss, so a person lying still, where keypoints are often lost, stays an alarm rather than clearing.",

      flow:[
        {t:"2.5 s window", d:{en:"recent frames only",zh:"仅最近若干帧"}},
        {t:"5 signals", d:{en:"lying ratio, lying mean, down, drop, angle change",zh:"躺比例、躺均值、下落、位移、角度变化"}},
        {t:"weighted sum", d:{en:"0.35 / 0.25 / 0.20 / 0.10 / 0.10",zh:"0.35 / 0.25 / 0.20 / 0.10 / 0.10"}},
        {t:"- conf_penalty", d:{en:"low-confidence poses discounted",zh:"低置信姿态被折扣"}},
        {t:"fall_score in [0,1]", d:{en:"feeds the state machine",zh:"喂给状态机"}}
      ],
      df:{in:["window of Features"], proc:["aggregate 5 signals","weighted blend","penalize low conf"], out:["fall_score","debug telemetry"]},
      why:{en:"In a 60-clip field test on 2026-06-21 it caught 58 of 60 falls (97% recall) with 1 false alarm (1.7%). The clips mix fast falls, slow slides, and everyday distractors like bending, sitting and walking. Both misses and the false alarm happened in low light, and the two misses were slow slides, where the descent is gentle and the pose is hard to hold. In normal light it caught every fall with no false alarm; night recall was 18 of 20 (90%). Low light is the explicit known limitation, still being improved with the 640 model and ISP night tuning. The trade-off is deliberate: a missed fall costs far more than a false alarm, so it is tuned recall-first. Time from the fall to the alert averages about 3 s on fast falls, measured from the floor moment, not the clip start.",
           zh:"2026-06-21 的一次 60 段实测:60 个跌倒命中 58(召回 97%),误报 1 次(1.7%)。这 60 段混了快速跌倒、缓慢下滑,以及弯腰、坐下、行走这类日常干扰动作。漏掉的 2 个和那次误报都发生在夜光下,而且漏的两个都是缓慢下滑:下坠轻、姿态难稳住。常光下每个跌倒都抓到、没有误报;夜光召回为 20 个里 18 个(90%)。夜光是明确的已知局限,仍在用 640 模型和 ISP 夜间调校改进。这个取舍是刻意的:漏报的代价远大于误报,所以按召回优先来调。从倒地到报警,快速跌倒平均约 3 秒,从倒地那一刻算,不是从录像开头。"} },
    { id:"reliability", code:"reliability",
      name:{en:"Reliability fixes",zh:"可靠性修复"},
      summary:{en:"Field-driven guards so a clock jump, a dead network, or a voice prompt never swallows a real fall.",zh:"几个实战兜底:时钟跳变、断网、或正在播报,都不该吞掉一次真实跌倒。"},
      flow:[
        {t:"NTP dt guard", d:{en:"clock corrects -> keep posture, drop velocity",zh:"时钟校正 -> 留姿态,弃速度"}},
        {t:"alert before speech", d:{en:"publish FALL_CONFIRMED before the TTS prompt",zh:"先发 FALL_CONFIRMED,再播 TTS"}, edge:{en:"order",zh:"顺序"}},
        {t:"fall preempts VAD", d:{en:"a pending fall interrupts a voice capture",zh:"待确认跌倒打断语音录制"}}
      ],
      df:{in:["clock jump","network down","mid-capture fall"], proc:["dt guard","decouple alert from TTS","preempt VAD"], out:["no false drop","alert still sent","fall not delayed"]},
      why:{en:"These are not features, they are bugs found in the field and fixed. An NTP correction used to spike downward velocity into a false fall; now the frame's posture is kept and only its velocity is discarded. The MQTT alert is published before the voice prompt, so a dead network or a slow TTS never blocks the caregiver notification. And a fall confirmed mid-conversation preempts the voice capture, so the system never finishes a chat before reacting to a fall.",
           zh:"这些不是功能,是现场踩出来、再修掉的 bug。NTP 校时曾经把下落速度冲出一个假摔倒;现在那一帧姿态保留,只丢掉速度。MQTT 报警在语音播报之前就发出去,所以断网或 TTS 卡顿都不会挡住给看护人的通知。对话进行中确认的跌倒会抢占语音录制,系统绝不会先把天聊完再去管摔倒。"} }

           zh:"四个主题撑起整个系统:eldercare/fall/event({event, ts, score, reason},每次状态跳变发一次,不保留)、eldercare/fall/state({state, fall_score, ts},保留)、eldercare/vision/health({alive, fps, ts},保留)、eldercare/alert/request({level} = ok / sos / confirmed,来自语音问询)。板子上只有 mosquitto_pub 命令行,没有 libmosquitto 头文件,所以用命令行发消息。因为大家都只认 broker 这个接口,视觉、跌倒、报警、语音几个服务可以各自单独重启,互不影响。"} },

           zh:"快照是尽力而为:就算没取到或上传失败,也不会让一条已经发出去的报警算作失败。优先级随严重程度递增:问询 ok 用普通优先级(default),confirmed 确认跌倒用 high,SOS 用 urgent,好让静音的手机也能响。冷却按级别分别计,所以同一级别的语音重试会被抑制,但真正的升级不会被丢掉。日志里会记下每一次被拦下或失败的推送,方便事后排查。"} },
    { id:"offline", code:"offline",
      name:{en:"Network-down strategy",zh:"断网策略"},

      why:{en:"For an eldercare device the order of priority matters more than the push itself. The fall decision, the MQTT event and the JSONL log are entirely local and happen whether or not the network is up; the voice check-in is on-device too. Only the family notification leaves the board, and it is best-effort: curl is bounded to 20 s with 2 retries so a dead network cannot block the pipeline, and every failed push is logged. If the vision health feed goes stale, the alert service raises a system-offline notice instead of staying silent.",
           zh:"对一台养老设备,优先级的顺序比推送本身更重要。跌倒判定、MQTT 事件、JSONL 日志全在本地,不管有没有网都会发生;语音问询也在板子上离线完成。只有给家人的通知会出板,而且是尽力而为:curl 限时 20 秒、重试 2 次,断网也卡不住流水线,每次失败都记日志。如果视觉心跳变陈旧,报警服务会主动发一条系统掉线提醒,而不是闷着不响。"} }

{
  id:"voice", color:"voice",
  name:{en:"Voice assistant",zh:"语音助手"}, name2:{en:"offline, full-duplex",zh:"离线全双工"},
  tag:{en:"An offline assistant that checks on the person and avoids hearing itself.",zh:"全离线的语音助手,会主动问情况,也不会把自己说的话当成输入。"},
  file:"src/cpp_runtime/voice_service.cpp",
  overview:{en:"A fully offline, full-duplex assistant: wake word, on-device ASR, a local LLM, and neural TTS. Echo cancellation keeps it from transcribing its own output, while a real person can still interrupt over the speaker. After a fall it asks whether the person is all right and decides whether to escalate.",
            zh:"一个完全离线、全双工的语音助手:唤醒词、端侧 ASR、本地 LLM、神经网络 TTS,整条链路都在本地。回声消除让它不会把自己播出去的话又录回来当输入,但真人还是能盖过喇叭把它打断。摔倒之后,它会主动问一句人有没有事,再决定要不要升级求助。"},
  subs:[
    { id:"aec", code:"aec",
      name:{en:"Echo cancellation (AEC)",zh:"回声消除(AEC)"},
      summary:{en:"PipeWire full-duplex with speex AEC and a double-talk gate.",zh:"PipeWire 全双工,speex AEC 加双讲门。"},
      flow:[
        {t:"playback x -> ref_ring", d:{en:"playback feeds the reference",zh:"播放信号喂入参考"}},
        {t:"mic d", d:{en:"near-end + echo + noise",zh:"近端 + 回声 + 噪声"}},
        {t:"speex_echo_cancellation", d:{en:"linear echo removed -> residual",zh:"消去线性回声 -> 残差"}},
        {t:"detect_double_talk", d:{en:"residual_excess && multi_band_decorrelated",zh:"residual_excess && multi_band_decorrelated"}, edge:{en:"both required",zh:"两者皆需"}},
        {t:"gate open / closed", d:{en:"real speech passes, TTS echo blocked",zh:"真人通过,TTS 回声拦截"}}
      ],
      df:{in:["mic frame","playback reference"], proc:["speex AEC","residual energy","cross-band correlation"], out:["clean near-end OR muted"]},
      why:{en:"The loudspeaker echo on this board is weakly correlated, so an energy-only gate is fooled by nonlinear residual and a correlation-only gate is fooled by the weak echo. The gate requires both a residual-energy excess and multi-band decorrelation, which suppresses the assistant's own TTS while still allowing a real interruption. Engineering details keep it robust: PipeWire's own module-echo-cancel misaligns reference and capture, so this is a standalone speexdsp MDF canceller on one shared clock; the reference-ring mutex uses PTHREAD_PRIO_INHERIT so the realtime audio thread never priority-inverts; PCM is written to stdout non-blocking, so a slow reader drops frames instead of stalling capture; and a --dtd-self-test mode validates the double-talk detector offline.",
           zh:"这块板子的喇叭回声相关性很弱:只看能量,会被非线性残差骗;只看相关性,又会被弱回声骗。所以这道门要求“残差能量超标”和“多频带不相关”两个条件同时成立,既压得住助手自己的 TTS,又放得进真人插话。"} },
    { id:"chain", code:"chain",
      name:{en:"Wake / ASR / LLM / TTS",zh:"唤醒 / ASR / LLM / TTS"},
      summary:{en:"KWS wake-word, Silero VAD, SenseVoice ASR, Qwen2.5-1.5B (llama.cpp) and Matcha TTS (Piper fallback), all on the board.",zh:"KWS 唤醒词、Silero VAD、SenseVoice ASR、Qwen2.5-1.5B(llama.cpp)和 Matcha TTS(Piper 兜底),全部在板上。"},
      flow:[
        {t:"KWS wake-word", d:{en:"sherpa-onnx zipformer (zh-en)",zh:"sherpa-onnx zipformer(中英)"}},
        {t:"Silero VAD", d:{en:"endpoint the utterance",zh:"切出一句话"}},
        {t:"SenseVoice ASR", d:{en:"offline Chinese -> text",zh:"离线中文 -> 文本"}},
        {t:"Qwen2.5-1.5B", d:{en:"llama.cpp, local :8081, multi-turn",zh:"llama.cpp,本地 :8081,多轮"}},
        {t:"Matcha TTS -> playback", d:{en:"Piper fallback; also feeds AEC reference",zh:"Piper 兜底;并喂回 AEC 参考"}, edge:{en:"loop",zh:"回路"}}
      ],
      df:{in:["mic audio"], proc:["VAD","ASR","local LLM","TTS"], out:["spoken reply","reference for AEC"]},
      why:{en:"No audio leaves the board. The local LLM is a real Qwen2.5-1.5B served by llama.cpp on :8081, not a canned fallback, and TTS prefers Matcha (resident at startup) with Piper as a lazy fallback. The C++ port restored a multi-turn session (wake once, then continue) that an earlier build had dropped. Endpoints are tuned for elders: it wakes after 520 ms of trailing silence and ends a user turn after 1000 ms; an active session stays open 90 s before dropping back to wake mode, and recorded audio is capped at 512 MB with a 24 h TTL.",
           zh:"音频一点都不出板子。本地大模型是 llama.cpp 跑的 Qwen2.5-1.5B,不是写死的兜底回复;TTS 优先 Matcha(启动即常驻)、Piper 兜底。C++ 版本还补回了早期弄丢的多轮对话(唤醒一次就能接着聊)。端点按老人节奏:尾静音 520 ms 触发唤醒、用户一句话静音 1000 ms 结束,活跃会话保持 90 秒再退回唤醒模式,录下的音频上限 512 MB、保留 24 小时。"} },
    { id:"fallans", code:"fallans",
      name:{en:"Post-fall check-in",zh:"跌倒后问询"},
      summary:{en:"A short prompt that allows interruption, then classification into ok / sos / unclear.",zh:"一句允许打断的短提示,再分类为 ok / sos / unclear。"},
      flow:[
        {t:"FALL event", d:{en:"publish confirmed first",zh:"先发布 confirmed"}},
        {t:"speak_local_nowait", d:{en:"short, classify-neutral prompt",zh:"短的、对分类中性的提示"}, edge:{en:"non-blocking",zh:"非阻塞"}},
        {t:"capture_vad -> ASR", d:{en:"reply, mixed with echo",zh:"回答,混有回声"}},
        {t:"classify_fall_reply", d:{en:"match echo-proof markers only",zh:"只匹配防回声的标记词"}},
        {t:"reassure / escalate", d:{en:"ok -> calm · sos/unclear -> family",zh:"ok -> 安抚 · sos/unclear -> 家人"}}
      ],
      df:{in:["fall event","mic reply"], proc:["short prompt + interruption","ASR","marker classify","re-ask once"], out:["ok / sos to alert path","spoken response"]},
      why:{en:"The prompt is about 2 s and word-neutral on purpose. The live AEC does not fully cancel the speaker, and a long prompt buried the reply under echo so ASR returned nothing. The classifier does not subtract the prompt (that once removed the person's own '我还好' and produced a false SOS); it matches only markers the prompt cannot contain. Silence defaults to SOS.",
           zh:"提示特意压到 2 秒左右,而且用词中性。实时 AEC 没法把喇叭完全消掉,提示一长,回答就被回声盖住,ASR 直接返回空。分类时不去“减掉提示原文”(以前这么做,把老人自己说的“我还好”也一起删了,结果误报成 SOS),只匹配那些提示里绝不可能出现的词。没听到回应,就默认按 SOS 处理。"} },
    { id:"selftalk", code:"selftalk",
      name:{en:"Self-talk loop fix",zh:"自言自语回路修复"},
      summary:{en:"Stops the assistant from transcribing its own speech back as a new request.",zh:"防止助手把自己说过的话又转写成一条新请求。"},
      flow:[
        {t:"rolling speech window", d:{en:"last ~15 s of what it said",zh:"它最近约 15 秒说过的话"}},
        {t:"LCS overlap match", d:{en:"new capture vs recent speech",zh:"新采集 vs 最近说过的"}},
        {t:"preface echo reject", d:{en:"drop fixed story / joke prefaces",zh:"丢掉固定的讲故事/笑话开场"}},
        {t:"short fragment drop", d:{en:"Silero<0.5 and <=2 CJK -> noise",zh:"Silero<0.5 且 CJK<=2 -> 噪声"}}
      ],
      df:{in:["ASR transcript","recent assistant speech"], proc:["LCS overlap","preface match","fragment gate"], out:["real user text OR dropped"]},
      why:{en:"Even with AEC the assistant could hear its own tail and answer it, looping. Three guards stop that: a rolling window of its recent speech is compared by longest-common-subsequence and high-overlap captures are dropped; the fixed prefaces it used to speak before a story or joke are matched and rejected; and barely-speech fragments (low Silero probability with one or two CJK characters, often a hallucinated lone marker) are treated as noise. These are real bugs found on the board, not theoretical.",
           zh:"即便有 AEC,助手也可能听到自己话音的尾巴再去回答,形成回路。三道闸挡住它:用最长公共子序列把新采集和它最近说过的话比对,重合度高的丢掉;它讲故事或笑话前那几句固定开场会被识别并拒掉;以及几乎不成话的碎片(Silero 概率低、只有一两个 CJK 字)按噪声处理。这些都是板子上真实踩到的 bug,不是纸上谈兵。"} },
    { id:"latency", code:"latency",
      name:{en:"Measured latency",zh:"实测延迟"},
      summary:{en:"End-to-end voice latency, measured from voice.log timing lines on the board.",zh:"端到端语音延迟,取自板子 voice.log 的 timing 行实测。"},
      flow:[
        {t:"wake KWS ~0.2 s", d:{en:"sherpa zipformer",zh:"sherpa zipformer"}},
        {t:"user ASR ~0.3-0.8 s", d:{en:"SenseVoice, one utterance",zh:"SenseVoice,一句话"}},
        {t:"LLM first clause ~2-4 s", d:{en:"Qwen2.5-1.5B (llama.cpp)",zh:"Qwen2.5-1.5B(llama.cpp)"}, edge:{en:"the long pole",zh:"主要瓶颈"}},
        {t:"TTS ~0.6-1.6 s/clause", d:{en:"Matcha, RTF ~0.1-0.4",zh:"Matcha,RTF ~0.1-0.4"}}
      ],
      df:{in:["mic utterance"], proc:["KWS","SenseVoice ASR","LLM first clause","streaming TTS"], out:["first audio out"]},
      why:{en:"From the voice.log timing lines: wake KWS about 0.2 s, wake-word ASR about 0.3 s, a user utterance through SenseVoice about 0.3-0.8 s (longer for long sentences), then the local Qwen2.5-1.5B first clause about 2-4 s, which is the dominant term, and TTS synthesis about 0.6-1.6 s per clause (faster than real time, Matcha resident at startup). Because the LLM streams clause by clause and TTS runs ahead of playback, the person hears the first words while later clauses are still being generated, so perceived latency is closer to the first-clause time than the full-reply time.",
           zh:"取自 voice.log 的 timing 行:唤醒 KWS 约 0.2 秒、唤醒词 ASR 约 0.3 秒、用户一句话过 SenseVoice 约 0.3-0.8 秒(长句更久),再到本地 Qwen2.5-1.5B 的首个分句约 2-4 秒(这是主导项),TTS 合成每个分句约 0.6-1.6 秒(快于实时,Matcha 启动即常驻)。因为 LLM 一句一句往外吐、TTS 抢在播放前面合成,人听到头几个字时后面的分句还在生成,所以体感延迟更接近首个分句的时间,而不是整段回答的时间。"} }
  ]

/* split a raw line into [code, comment] without breaking on quotes */
function splitComment(line, lang){
  const hash = (lang!=="cpp");
  let q=null;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(q){ if(c===q && line[i-1]!=="\\") q=null; continue; }
    if(c==='"'||c==="'"){ q=c; continue; }
    if(!hash && c==="/" && line[i+1]==="/") return [line.slice(0,i), line.slice(i)];
    if(hash && c==="#") return [line.slice(0,i), line.slice(i)];
  }
  return [line,""];
}

function codeBlock(id){
  const el=document.getElementById("src-"+id);
  if(!el) return "";
  const lang=el.dataset.lang||"cpp", file=el.dataset.file||"";
  let raw=el.textContent.replace(/^\n+/,"").replace(/\s+$/,"");
  const lines=raw.split("\n").map(ln=>{
    const [code,comment]=splitComment(ln,lang);
    const html=esc(code)+(comment?'<span class="cmt">'+esc(comment)+"</span>":"");
    return '<span class="cl">'+(html.length?html:"&nbsp;")+"</span>";
  }).join("");
  return '<div class="code"><div class="cfile"><span>'+esc(file)+'</span><span class="lang">'+tr(T.pseudo)+'</span></div><pre><code>'+lines+"</code></pre></div>";
}

/* generic vertical flow chart */
function flowSvg(steps, color){
  const W=560, bh=58, gap=42, pad=4;
  const H=steps.length*bh+(steps.length-1)*gap+pad*2;
  const cx=W/2;
  let y=pad, out=['<svg viewBox="0 0 '+W+' '+H+'" class="flow" preserveAspectRatio="xMidYMin meet">'];
  steps.forEach((s,i)=>{
    if(i>0){
      const ya=y-gap, yb=y;
      out.push('<line class="fln" x1="'+cx+'" y1="'+(ya+3)+'" x2="'+cx+'" y2="'+(yb-9)+'" marker-end="url(#fa)"/>');
      if(s.edge) out.push('<text class="fedge" x="'+(cx+12)+'" y="'+((ya+yb)/2+3)+'">'+esc(tr(s.edge))+"</text>");
    }
    out.push('<g><rect class="fbox" x="2" y="'+y+'" width="'+(W-4)+'" height="'+bh+'" style="stroke:var(--'+color+')"/>');
    out.push('<text class="ft" x="18" y="'+(y+24)+'">'+esc(s.t)+"</text>");
    out.push('<text class="fd" x="18" y="'+(y+44)+'">'+esc(tr(s.d))+"</text></g>");
    y+=bh+gap;
  });
  out.push("</svg>");
  return out.join("");
}

function abChart(){
  var groups=[{l:{en:"full exposure",zh:"全曝光"}},{l:{en:"1/2 exposure",zh:"1/2 曝光"}},{l:{en:"1/3 exposure",zh:"1/3 曝光"}}];
  var data={"640":[[100,100],[94.3,94.3],[88.6,94.3]],"384":[[77.1,77.1],[74.3,85.7],[68.6,82.9]]};
  var cx=[170,360,550];
  function panel(model,top,title){
    var base=top+168, scale=1.32;
    var s='<text x="28" y="'+(top+16)+'" font-family="sans-serif" font-size="14" font-weight="600" fill="#33302b">'+esc(title)+'</text>';
    s+='<line x1="40" y1="'+base+'" x2="650" y2="'+base+'" stroke="#e9e0d3"/>';
    data[model].forEach(function(pair,gi){
      var c=cx[gi];
      [["#c2a48a",pair[0],-42],["#3f8f6b",pair[1],6]].forEach(function(b){
        var v=b[1], h=v*scale, x=c+b[2], y=base-h;
        s+='<rect x="'+x+'" y="'+y.toFixed(1)+'" width="36" height="'+h.toFixed(1)+'" rx="4" fill="'+b[0]+'"/>';
        s+='<text x="'+(x+18)+'" y="'+(y-5).toFixed(1)+'" text-anchor="middle" font-family="sans-serif" font-size="11.5" font-weight="500" fill="#6f655b">'+Math.round(v)+'%</text>';
      });
      s+='<text x="'+c+'" y="'+(base+18)+'" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6f655b">'+esc(tr(groups[gi].l))+'</text>';
    });
    return s;
  }
  return '<svg role="img" viewBox="0 0 680 500" width="100%" xmlns="http://www.w3.org/2000/svg">'+
    '<title>'+esc(tr({en:"Exposure vs detection rate, with and without enhancement",zh:"曝光与检出率,加不加增强对比"}))+'</title>'+
    '<rect x="2" y="4" width="676" height="492" rx="16" fill="#ffffff" stroke="#e9e0d3"/>'+
    '<rect x="408" y="14" width="12" height="12" rx="2" fill="#c2a48a"/><text x="426" y="24" font-family="sans-serif" font-size="12" fill="#6f655b">'+esc(tr({en:"no enhancement",zh:"未增强"}))+'</text>'+
    '<rect x="548" y="14" width="12" height="12" rx="2" fill="#3f8f6b"/><text x="566" y="24" font-family="sans-serif" font-size="12" fill="#6f655b">'+esc(tr({en:"+ night enhancement",zh:"+ 夜间增强"}))+'</text>'+
    panel("640",30,tr({en:"640 model · detection rate",zh:"640 模型 · 检出率"}))+
    panel("384",262,tr({en:"384 model · detection rate",zh:"384 模型 · 检出率"}))+
    '</svg>';
}

function subView(m,s){
  const idx=m.subs.findIndex(x=>x.id===s.id);
  const prev=m.subs[idx-1], next=m.subs[idx+1];
  const flow = s.customFlow==="states" ? stateMachineSvg() : (s.flow ? flowSvg(s.flow,m.color) : "");
  let nav='<div class="subnav">';
  nav+= prev ? '<a href="#/'+m.id+"/"+prev.id+'">← '+esc(tr(prev.name))+"</a>" : '<a href="#/'+m.id+'">↑ '+esc(tr(m.name))+"</a>";
  nav+= next ? '<a href="#/'+m.id+"/"+next.id+'">'+esc(tr(next.name))+" →</a>" : '<a href="#/'+m.id+'">'+tr(T.subs)+" ↑</a>";
  nav+="</div>";
  return ''+
    '<div class="crumb"><a href="#/">'+tr(T.home)+'</a><span>›</span><a href="#/'+m.id+'">'+esc(tr(m.name))+'</a><span>›</span>'+esc(tr(s.name))+"</div>"+

        "<h1>"+esc(tr(s.name))+"</h1>"+

      panel("why",m.color,'<p class="why">'+esc(tr(s.why))+"</p>")+
      nav+
    "</section>";
}

  document.documentElement.lang = L()==="zh" ? "zh-CN" : "en";
  document.getElementById("lang-en").classList.toggle("on",L()==="en");
  document.getElementById("lang-zh").classList.toggle("on",L()==="zh");
  document.getElementById("foot").textContent = tr(T.foot);
  var bs=document.getElementById("brandsub"); if(bs) bs.textContent = tr(T.brand_sub);

  const parts=location.hash.replace(/^#\/?/,"").split("/").filter(Boolean);
  const app=document.getElementById("app");
  if(parts.length===0){ app.innerHTML=home(); window.scrollTo(0,0); return; }
  const m=DATA.find(x=>x.id===parts[0]);
  if(!m){ app.innerHTML=home(); return; }
  if(parts.length===1){ app.innerHTML=moduleView(m); window.scrollTo(0,0); return; }
  const s=m.subs.find(x=>x.id===parts[1]);
  if(!s){ app.innerHTML=moduleView(m); window.scrollTo(0,0); return; }
  app.innerHTML=subView(m,s); window.scrollTo(0,0);
}

window.addEventListener("hashchange",render);
render();
</script>
</body>
</html>
